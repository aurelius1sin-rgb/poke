// ============================================================
// CONSTANTS
// ============================================================

const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const SUITS = ['s','h','d','c'];
const SUIT_SYMBOLS = { s: '\u2660', h: '\u2665', d: '\u2666', c: '\u2663' };
const SUIT_NAMES = { s: 'Spades', h: 'Hearts', d: 'Diamonds', c: 'Clubs' };
// ---- TEXT-INPUT PARSERS (hole cards + board) ----
function _parseHoleInput(s) {
  if (!s) return null;
  s = s.trim();
  if (!s.length) return null;
  const upper = s.toUpperCase();
  // 4-char: exact combo "AhKs"
  if (s.length === 4) {
    const r1 = upper[0], su1 = s[1].toLowerCase();
    const r2 = upper[2], su2 = s[3].toLowerCase();
    if (!RANKS.includes(r1) || !RANKS.includes(r2)) return null;
    if (!SUITS.includes(su1) || !SUITS.includes(su2)) return null;
    if (r1 === r2 && su1 === su2) return null;
    return { type: 'combo', combo: [{ rank: r1, suit: su1 }, { rank: r2, suit: su2 }] };
  }
  // 2-char: pocket pair "TT"
  if (s.length === 2 && upper[0] === upper[1]) {
    const r = upper[0];
    if (!RANKS.includes(r)) return null;
    return { type: 'hand', hand: { r1: r, r2: r, type: 'pair', label: r + r } };
  }
  // 3-char: "AKs" or "AKo"
  if (s.length === 3) {
    const r1 = upper[0], r2 = upper[1];
    const t = s[2].toLowerCase();
    if (!RANKS.includes(r1) || !RANKS.includes(r2)) return null;
    if (r1 === r2) return null;
    if (t !== 's' && t !== 'o') return null;
    const i1 = RANKS.indexOf(r1), i2 = RANKS.indexOf(r2);
    const [hi, lo] = i1 < i2 ? [r1, r2] : [r2, r1];
    return { type: 'hand', hand: { r1: hi, r2: lo, type: t === 's' ? 'suited' : 'offsuit', label: hi + lo + t } };
  }
  return null;
}

function _comboToHand(combo) {
  const [c1, c2] = combo;
  if (c1.rank === c2.rank) return { r1: c1.rank, r2: c2.rank, type: 'pair', label: c1.rank + c2.rank };
  const i1 = RANKS.indexOf(c1.rank), i2 = RANKS.indexOf(c2.rank);
  const [hi, lo] = i1 < i2 ? [c1.rank, c2.rank] : [c2.rank, c1.rank];
  const type = c1.suit === c2.suit ? 'suited' : 'offsuit';
  return { r1: hi, r2: lo, type, label: hi + lo + (type === 'suited' ? 's' : 'o') };
}

function _parseBoardInput(s) {
  if (!s) return [];
  const tokens = s.toUpperCase().match(/[2-9TJQKA][HDCS]/g) || [];
  return tokens.map(t => ({ rank: t[0], suit: t[1].toLowerCase() }));
}

const POSTFLOP_ORDER = ['SB','BB','UTG','UTG+1','MP','HJ','CO','BTN'];

const POSTFLOP_3BET_MULTIPLIER = 9;

// ============================================================
// LINE BUILDERS
// ============================================================

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function buildPreflopLines() {
  const lines = [];
  POSITIONS_8.slice(0, -1).forEach((opener, openerIdx) => {
    POSITIONS_8.slice(openerIdx + 1).forEach(defender => {
      lines.push({
        id: slugify(`${opener} raise ${defender} call`),
        label: `${opener} raise ${defender} call`,
        group: `${opener} open spots`,
        players: [opener, defender],
        opener,
        defender,
        aggressor: opener,
        potType: 'SRP',
        potBB: 6,
        commitmentBB: 3,
      });
      lines.push({
        id: slugify(`${opener} raise ${defender} 3bet ${opener} call`),
        label: `${opener} raise ${defender} 3bet ${opener} call`,
        group: `${opener} open spots`,
        players: [opener, defender],
        opener,
        defender,
        aggressor: defender,
        potType: '3BP',
        potBB: 18,
        commitmentBB: 9,
      });
      lines.push({
        id: slugify(`${opener} raise ${defender} 3bet ${opener} 4bet ${defender} call`),
        label: `${opener} raise ${defender} 3bet ${opener} 4bet ${defender} call`,
        group: `${opener} open spots`,
        players: [opener, defender],
        opener,
        defender,
        aggressor: opener,
        potType: '4BP',
        potBB: 42,
        commitmentBB: 21,
      });
    });
  });
  return lines;
}

const PREFLOP_LINES = buildPreflopLines();

function calcPotMultiplier(betSize, raised, threeBet) {
  // Pot growth on a street, each "raise" being to 3x the prior bet.
  //  - bet X, call:                          each puts X     -> +2X     -> mult = 1 + 2X/100
  //  - bet X, raise to 3X, call:             each puts 3X    -> +6X     -> mult = 1 + 6X/100
  //  - bet X, raise to 3X, 3bet to 9X, call: each puts 9X    -> +18X    -> mult = 1 + 18X/100
  if (!betSize) return 1;
  if (threeBet) return 1 + 2 * POSTFLOP_3BET_MULTIPLIER * (betSize / 100);
  if (raised)   return 1 + 2 * POSTFLOP_RAISE_MULTIPLIER * (betSize / 100);
  return            1 + 2  * (betSize / 100);
}

function calcStreetCommitmentMultiplier(betSize, raised, threeBet) {
  if (!betSize) return 0;
  if (threeBet) return POSTFLOP_3BET_MULTIPLIER * (betSize / 100);
  if (raised) return POSTFLOP_RAISE_MULTIPLIER * (betSize / 100);
  return betSize / 100;
}

function makeStreetLine(id, label, betSize = 0, raised = false, threeBet = false, lastAggressor = null, group = 'first-to-act') {
  return {
    id,
    label,
    betSize,
    raised,
    threeBet,
    lastAggressor,
    group,
    potMultiplier: calcPotMultiplier(betSize, raised, threeBet),
    commitmentMultiplier: calcStreetCommitmentMultiplier(betSize, raised, threeBet),
  };
}

function makePostflopLines(heroIsIP) {
  if (heroIsIP === null) return [];

  // Compact label notation:
  //   "V x"   = villain checks    ·  "H x"   = hero checks
  //   "V 25%" = villain bets 25%  ·  "CR"    = check-raise to 3x
  //   "3-bet" = re-raise to 3x the raise
  // Left-to-right ordering is chronological.

  const lines = [];
  if (heroIsIP) {
    lines.push(makeStreetLine(
      'ip-check-check',
      'V x \u2192 H x',
      0, false, false, null, 'first-to-act'
    ));
    BET_SIZES.forEach(size => {
      lines.push(makeStreetLine(
        `ip-check-hero-bet-${size}-call`,
        `V x \u2192 H ${size}% \u2192 V call`,
        size, false, false, 'Hero', 'check-route'
      ));
      lines.push(makeStreetLine(
        `ip-check-hero-bet-${size}-checkraise-call`,
        `V x \u2192 H ${size}% \u2192 V CR \u2192 H call`,
        size, true, false, 'Villain', 'check-route'
      ));
      lines.push(makeStreetLine(
        `ip-check-hero-bet-${size}-checkraise-3bet-call`,
        `V x \u2192 H ${size}% \u2192 V CR \u2192 H 3-bet \u2192 V call`,
        size, true, true, 'Hero', 'check-route'
      ));
    });
    BET_SIZES.forEach(size => {
      lines.push(makeStreetLine(
        `ip-villain-bet-${size}-hero-call`,
        `V ${size}% \u2192 H call`,
        size, false, false, 'Villain', 'bet-route'
      ));
      lines.push(makeStreetLine(
        `ip-villain-bet-${size}-hero-raise-call`,
        `V ${size}% \u2192 H raise \u2192 V call`,
        size, true, false, 'Hero', 'bet-route'
      ));
      lines.push(makeStreetLine(
        `ip-villain-bet-${size}-hero-raise-3bet-call`,
        `V ${size}% \u2192 H raise \u2192 V 3-bet \u2192 H call`,
        size, true, true, 'Villain', 'bet-route'
      ));
    });
    return lines;
  }

  // OOP
  lines.push(makeStreetLine(
    'oop-check-check',
    'H x \u2192 V x',
    0, false, false, null, 'first-to-act'
  ));
  BET_SIZES.forEach(size => {
    lines.push(makeStreetLine(
      `oop-hero-check-villain-bet-${size}-call`,
      `H x \u2192 V ${size}% \u2192 H call`,
      size, false, false, 'Villain', 'check-route'
    ));
    lines.push(makeStreetLine(
      `oop-hero-check-villain-bet-${size}-checkraise-call`,
      `H x \u2192 V ${size}% \u2192 H CR \u2192 V call`,
      size, true, false, 'Hero', 'check-route'
    ));
    lines.push(makeStreetLine(
      `oop-hero-check-villain-bet-${size}-checkraise-3bet-call`,
      `H x \u2192 V ${size}% \u2192 H CR \u2192 V 3-bet \u2192 H call`,
      size, true, true, 'Villain', 'check-route'
    ));
  });
  BET_SIZES.forEach(size => {
    lines.push(makeStreetLine(
      `oop-hero-bet-${size}-villain-call`,
      `H ${size}% \u2192 V call`,
      size, false, false, 'Hero', 'bet-route'
    ));
    lines.push(makeStreetLine(
      `oop-hero-bet-${size}-villain-raise-call`,
      `H ${size}% \u2192 V raise \u2192 H call`,
      size, true, false, 'Villain', 'bet-route'
    ));
    lines.push(makeStreetLine(
      `oop-hero-bet-${size}-villain-raise-3bet-call`,
      `H ${size}% \u2192 V raise \u2192 H 3-bet \u2192 V call`,
      size, true, true, 'Hero', 'bet-route'
    ));
  });
  return lines;
}

function getDecisionOptions(heroIsIP) {

    ...BET_SIZES.map(size => ({

      type: 'facing-3bet',
      initialBetSize: size,

    ...BET_SIZES.map(size => ({
      id: `oop-hero-bet-${size}-villain-raise`,
      label: `H ${size}% \u2192 V raise \u2192 my turn`,
      type: 'facing-raise',
      initialBetSize: size,
      group: 'bet-route',
    })),
  ];
}


// ============================================================
// HAND EVALUATION
// ============================================================

function evalHand(heroCards, board) {
  const all = [...heroCards, ...board];
  const canImprove = board.length < 5;
  const rankCount = {};
  const suitCount = {};
  all.forEach(c => {
    rankCount[c.rank] = (rankCount[c.rank] || 0) + 1;
    suitCount[c.suit] = (suitCount[c.suit] || 0) + 1;
  });

  const boardRanks = board.map(c => RANK_VAL[c.rank]).sort((a,b) => b-a);
  const heroRanks = heroCards.map(c => RANK_VAL[c.rank]).sort((a,b) => b-a);

  let made = 'high-card';
  let madeLabel = 'High Card';
  let strength = 0;

  const counts = Object.values(rankCount).sort((a,b) => b-a);

  if (counts[0] >= 3 && counts[1] >= 2) {
    made = 'full-house'; madeLabel = 'Full House'; strength = 99;
  } else if (counts[0] >= 3) {
    const tripRank = Object.keys(rankCount).find(r => rankCount[r] === 3);
    const heroHasIt = heroCards.filter(c => c.rank === tripRank).length;
    if (heroHasIt === 2) { made = 'set'; madeLabel = 'Set'; strength = 94; }
    else { made = 'trips'; madeLabel = 'Trips'; strength = 90; }
  } else if (counts[0] === 2 && counts[1] === 2) {
    made = 'two-pair'; madeLabel = 'Two Pair'; strength = 82;
  } else if (counts[0] === 2) {
    const pairRank = Object.keys(rankCount).find(r => rankCount[r] === 2);
    const pairVal = RANK_VAL[pairRank];
    const heroPairCount = heroCards.filter(c => c.rank === pairRank).length;
    if (heroPairCount === 2) {
      if (pairVal > boardRanks[0]) { made = 'overpair'; madeLabel = 'Overpair'; strength = 75; }
      else if (boardRanks[1] && pairVal > boardRanks[1]) { made = 'pp-middle'; madeLabel = 'Pocket Pair'; strength = 38; }
      else { made = 'pp-under'; madeLabel = 'Underpair'; strength = 18; }
    } else if (heroPairCount === 1) {
      const kicker = heroCards.find(c => c.rank !== pairRank);
      const kickerVal = kicker ? RANK_VAL[kicker.rank] : 0;
      if (pairVal === boardRanks[0]) {
        made = 'top-pair';
        madeLabel = `Top Pair (${kicker?.rank || '?'} kicker)`;
        strength = 55 + Math.min(15, (kickerVal - 2) * 1.1);
      } else if (pairVal === boardRanks[1]) {
        made = 'middle-pair'; madeLabel = 'Middle Pair'; strength = 40;
      } else {
        made = 'bottom-pair'; madeLabel = 'Bottom Pair'; strength = 28;
      }
    } else {
      made = 'paired-board'; madeLabel = 'Unimproved'; strength = 6;
    }
  }

  const maxSuit = Math.max(...Object.values(suitCount));
  const heroSuits = heroCards.map(c => c.suit);
  let flush = false, flushDraw = false, backdoorFD = false;
  if (maxSuit >= 5) {
    flush = true; made = 'flush'; madeLabel = 'Flush'; strength = 95;
  } else if (maxSuit === 4 && canImprove) {
    const flushSuit = Object.keys(suitCount).find(s => suitCount[s] === 4);
    if (heroSuits.includes(flushSuit)) flushDraw = true;
  } else if (maxSuit === 3 && heroSuits[0] === heroSuits[1] && canImprove) {
    const flushSuit = Object.keys(suitCount).find(s => suitCount[s] === 3);
    if (heroSuits.includes(flushSuit)) backdoorFD = true;
  }

  const uniqueRanks = [...new Set(all.map(c => RANK_VAL[c.rank]))].sort((a,b) => a-b);
  if (uniqueRanks.includes(14)) uniqueRanks.unshift(1);

  let straight = false, oesd = false, gutshot = false;
  for (let i = 0; i <= uniqueRanks.length - 5; i++) {
    if (uniqueRanks[i+4] - uniqueRanks[i] === 4) {
      straight = true; made = 'straight'; madeLabel = 'Straight'; strength = 92;
      break;
    }
  }
  if (!straight && canImprove) {
    const heroVals = heroCards.map(c => RANK_VAL[c.rank]);
    for (let i = 0; i <= uniqueRanks.length - 4; i++) {
      if (uniqueRanks[i+3] - uniqueRanks[i] === 3) {
        const seq = uniqueRanks.slice(i, i+4);
        if (seq[0] > 1 && seq[3] < 14 && seq.some(v => heroVals.includes(v))) {
          oesd = true;
        }
      }
    }
    if (!oesd) {
      for (let i = 0; i < uniqueRanks.length; i++) {
        for (let j = i+1; j < uniqueRanks.length; j++) {
          if (uniqueRanks[j] - uniqueRanks[i] === 4) {
            const window = uniqueRanks.filter(v => v >= uniqueRanks[i] && v <= uniqueRanks[j]);
            if (window.length === 4 && window.some(v => heroVals.includes(v))) {
              gutshot = true;
            }
          }
        }
      }
    }
  }

  const topBoard = boardRanks[0];
  const overcards = heroRanks.filter(r => r > topBoard).length;
  let drawEquity = 0;
  if (flushDraw) drawEquity += 18;
  if (oesd) drawEquity += 14;
  if (gutshot && !oesd) drawEquity += 5;
  if (backdoorFD && !flushDraw) drawEquity += 2;

  if (made === 'high-card' || made === 'paired-board') {
    strength = overcards * 5 + drawEquity;
  } else {
    strength = Math.min(96, strength + drawEquity * 0.25);
  }

  const drawLabels = [];
  if (!flush) {
    if (flushDraw) drawLabels.push('Flush Draw');
    if (oesd) drawLabels.push('OESD');
    if (gutshot && !oesd) drawLabels.push('Gutshot');
    if (backdoorFD && !flushDraw) drawLabels.push('Backdoor FD');
  }

  return {
    made,
    madeLabel,
    strength,
    flush,
    flushDraw,
    backdoorFD,
    straight,
    oesd,
    gutshot,
    overcards,
    drawLabels,
    boardTexture: getBoardTexture(board),
  };
}

function getBoardTexture(board) {
  const rankCounts = {};
  const suitCounts = {};
  board.forEach(card => {
    rankCounts[card.rank] = (rankCounts[card.rank] || 0) + 1;
    suitCounts[card.suit] = (suitCounts[card.suit] || 0) + 1;
  });

  const ranks = [...new Set(board.map(card => RANK_VAL[card.rank]))].sort((a,b) => a-b);
  const paired = Object.values(rankCounts).some(count => count >= 2);
  const monotone = Object.values(suitCounts).some(count => count >= 3);
  const twoTone = Object.values(suitCounts).some(count => count === 2);
  let connected = 0;
  for (let i = 1; i < ranks.length; i++) {
    if (ranks[i] - ranks[i - 1] <= 2) connected += 1;
  }
  const highCard = Math.max(...ranks);
  const wetness = (monotone ? 3 : twoTone ? 1 : 0) + connected + (paired ? -1 : 0);

  return {
    paired,
    monotone,
    twoTone,
    connected,
    highCard,
    wetness,
  };
}

// ============================================================
// PREFLOP RANGE LIBRARY (8-max NL cash, 100bb)
// ============================================================
// Cash-game baselines used for both the visible 13x13 charts and the
// villain range that feeds equity/recommendations. RFI ranges use the
// public PokerCoaching 8-max/full-ring cash-game shorthand as the anchor;
// response ranges are conservative 100bb cash defaults in the same format.

const _R = (...hands) => new Set(hands);

function expandRangeToken(token) {
  const clean = String(token || '').trim();
  if (!clean) return [];
  const plus = clean.endsWith('+');
  const base = plus ? clean.slice(0, -1) : clean;
  if (!plus) return [base];

  if (base.length === 2 && base[0] === base[1]) {
    const start = RANKS.indexOf(base[0]);
    return start === -1 ? [] : RANKS.slice(0, start + 1).map(rank => rank + rank);
  }

  if (base.length === 3) {
    const high = base[0];
    const low = base[1];
    const suitedness = base[2];
    const highIdx = RANKS.indexOf(high);
    const lowIdx = RANKS.indexOf(low);
    if (highIdx === -1 || lowIdx === -1 || highIdx >= lowIdx) return [];
    return RANKS.slice(highIdx + 1, lowIdx + 1).map(rank => high + rank + suitedness);
  }

  return [base];
}

function rangeFromNotation(text) {
  const hands = String(text || '')
    .split(',')
    .flatMap(token => expandRangeToken(token));
  return _R(...hands);
}

const RFI_RANGES = {
  UTG: rangeFromNotation('77+,A3s+,K9s+,QTs+,JTs,T9s,AQo+,KQo'),

function positionIndex(pos) {
  const idx = POSITIONS_8.indexOf(pos);
  return idx === -1 ? POSITIONS_8.length : idx;
}

function openingBand(opener) {
  const idx = positionIndex(opener);
  if (idx <= 1) return 'early';
  if (idx <= 3) return 'middle';
  if (idx <= 4) return 'cutoff';
  if (idx <= 5) return 'button';
  return 'blind';
}

function defaultIpFlatRange(opener) {
  const band = openingBand(opener);
  if (band === 'early') return _R('JJ','TT','99','88','77','AQs','AJs','ATs','KQs','KJs','QJs','JTs','T9s','98s');
  if (band === 'middle') return _R('TT','99','88','77','66','55','AQs','AJs','ATs','A9s','KQs','KJs','KTs','QJs','QTs','JTs','T9s','98s','87s','76s');
  if (band === 'cutoff') return _R('TT','99','88','77','66','55','44','AJs','ATs','A9s','A8s','KQs','KJs','KTs','QJs','QTs','JTs','J9s','T9s','T8s','98s','87s','76s','65s');
  return _R('99','88','77','66','55','44','AJs','ATs','A9s','KQs','KJs','KTs','QJs','QTs','JTs','T9s','98s','87s','76s','65s');
}

}

function defaultBbDefendRange(opener) {
  const band = openingBand(opener);
  if (band === 'early') return DEFEND_RANGES['BB|UTG'];
  if (band === 'middle') return DEFEND_RANGES['BB|MP'] || DEFEND_RANGES['BB|HJ'];
  if (band === 'cutoff') return DEFEND_RANGES['BB|CO'];
  if (band === 'button') return DEFEND_RANGES['BB|BTN'];
  return DEFEND_RANGES['BB|SB'];
}

function resolveDefaultDefendRange(defender, opener) {
  if (defender === 'BB') return defaultBbDefendRange(opener) || new Set();
  if (defender === 'SB') return defaultSbFlatRange(opener);
  return defaultIpFlatRange(opener);
}

function resolveVillainPreflopRange(preflopAction, heroPos) {
  if (!preflopAction) return new Set();
  const villainPos = preflopAction.players.find(p => p !== heroPos);
  if (!villainPos) return new Set();
  const villainIsOpener = preflopAction.opener === villainPos;

  if (preflopAction.potType === 'SRP') {
    if (villainIsOpener) return RFI_RANGES[villainPos] || new Set();
    const key = `${villainPos}|${preflopAction.opener}`;
    return DEFEND_RANGES[key] || resolveDefaultDefendRange(villainPos, preflopAction.opener);
  }
  if (preflopAction.potType === '3BP') {
    if (villainIsOpener) return CALL_VS_3BET_RANGES[villainPos] || new Set();
    return THREEBET_RANGES[`vs${preflopAction.opener}`] || THREEBET_RANGES.vsMP || new Set();
  }
  if (preflopAction.potType === '4BP') {
    if (villainIsOpener) return FOURBET_RANGES[villainPos] || new Set();
    return CALL_VS_4BET_RANGES[villainPos] || new Set();
  }
  return new Set();
}

function expandRangeToCombos(rangeSet, deadCards) {
  if (!rangeSet || rangeSet.size === 0) return [];
  const excluded = new Set(deadCards.map(c => c.rank + c.suit));
  const combos = [];
  rangeSet.forEach(token => {
    if (token.length === 2) {
      const r = token[0];
      for (let i = 0; i < SUITS.length; i++) {
        for (let j = i + 1; j < SUITS.length; j++) {
          const t1 = r + SUITS[i], t2 = r + SUITS[j];
          if (!excluded.has(t1) && !excluded.has(t2))
            combos.push([{ rank: r, suit: SUITS[i] }, { rank: r, suit: SUITS[j] }]);
        }
      }
    } else if (token[2] === 's') {
      const r1 = token[0], r2 = token[1];
      SUITS.forEach(s => {
        const t1 = r1 + s, t2 = r2 + s;
        if (!excluded.has(t1) && !excluded.has(t2))
          combos.push([{ rank: r1, suit: s }, { rank: r2, suit: s }]);
      });
    } else if (token[2] === 'o') {
      const r1 = token[0], r2 = token[1];
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          if (i === j) continue;
          const t1 = r1 + SUITS[i], t2 = r2 + SUITS[j];
          if (!excluded.has(t1) && !excluded.has(t2))
            combos.push([{ rank: r1, suit: SUITS[i] }, { rank: r2, suit: SUITS[j] }]);
        }
      }
    }
  });
  return combos;
}

// ============================================================
// 5-CARD AND 7-CARD HAND EVALUATION (for Monte Carlo)
// ============================================================

function rank5(c) {
  const ranks = c.map(x => RANK_VAL[x.rank]).sort((a,b) => b-a);
  const suits = c.map(x => x.suit);
  const rc = {};
  ranks.forEach(r => rc[r] = (rc[r] || 0) + 1);
  const counts = Object.values(rc).sort((a,b) => b-a);
  const distinct = Object.keys(rc).map(Number).sort((a,b) => b-a);
  const flush = suits.every(s => s === suits[0]);
  let straight = false, sh = 0;
  if (distinct.length === 5) {
    if (distinct[0] - distinct[4] === 4) { straight = true; sh = distinct[0]; }
    else if (distinct[0] === 14 && distinct[1] === 5 && distinct[2] === 4 && distinct[3] === 3 && distinct[4] === 2) { straight = true; sh = 5; }
  }
  if (straight && flush) return 8e12 + sh;
  if (counts[0] === 4) {
    const q = Number(Object.keys(rc).find(r => rc[r] === 4));
    const k = Number(Object.keys(rc).find(r => rc[r] === 1));
    return 7e12 + q * 100 + k;
  }
  if (counts[0] === 3 && counts[1] === 2) {
    const t = Number(Object.keys(rc).find(r => rc[r] === 3));
    const p = Number(Object.keys(rc).find(r => rc[r] === 2));
    return 6e12 + t * 100 + p;
  }
  if (flush) {
    let s = 5e12;
    distinct.forEach((r, i) => s += r * Math.pow(15, 4-i));
    return s;
  }
  if (straight) return 4e12 + sh;
  if (counts[0] === 3) {
    const t = Number(Object.keys(rc).find(r => rc[r] === 3));
    const ks = Object.keys(rc).filter(r => rc[r] === 1).map(Number).sort((a,b) => b-a);
    return 3e12 + t * 10000 + ks[0] * 100 + ks[1];
  }
  if (counts[0] === 2 && counts[1] === 2) {
    const ps = Object.keys(rc).filter(r => rc[r] === 2).map(Number).sort((a,b) => b-a);
    const k = Number(Object.keys(rc).find(r => rc[r] === 1));
    return 2e12 + ps[0] * 10000 + ps[1] * 100 + k;
  }
  if (counts[0] === 2) {
    const p = Number(Object.keys(rc).find(r => rc[r] === 2));
    const ks = Object.keys(rc).filter(r => rc[r] === 1).map(Number).sort((a,b) => b-a);
    return 1e12 + p * 1000000 + ks[0] * 10000 + ks[1] * 100 + ks[2];
  }
  let s = 0;
  distinct.forEach((r, i) => s += r * Math.pow(15, 4-i));
  return s;
}

function rank7(cards) {
  let best = 0;
  for (let i = 0; i < 7; i++) {
    for (let j = i + 1; j < 7; j++) {
      const five = [];
      for (let k = 0; k < 7; k++) if (k !== i && k !== j) five.push(cards[k]);
      const v = rank5(five);
      if (v > best) best = v;
    }
  }
  return best;
}

const EQUITY_CACHE = new Map();
const HEADS_UP_EQUITY_CACHE = new Map();
const RESPONSE_SCORE_CACHE = new Map();
const RESPONSE_CACHE = new Map();

function cardKey(card) {
  return `${card.rank}${card.suit}`;
}

function comboKey(combo) {
  return combo.map(cardKey).sort().join('');
}

function equityCacheKey(heroCombo, villainCombos, board) {
  const hero = comboKey(heroCombo);
  const boardKey = board.map(cardKey).join('');
  const villains = villainCombos.map(comboKey).sort().join(',');
  return `${hero}|${boardKey}|${villains}`;
}

function rememberEquity(key, value) {
  if (EQUITY_CACHE.size >= EQUITY_CACHE_LIMIT) {
    const firstKey = EQUITY_CACHE.keys().next().value;
    EQUITY_CACHE.delete(firstKey);
  }
  EQUITY_CACHE.set(key, value);
  return value;
}

function responseCacheKey(heroCombo, villainCombos, board, betSizePct, isFacingHeroRaise) {
  const hero = heroCombo ? comboKey(heroCombo) : 'range-neutral';
  const boardKey = board.map(cardKey).join('');
  const villains = villainCombos.map(comboKey).sort().join(',');
  return `${hero}|${boardKey}|${villains}|${betSizePct}|${isFacingHeroRaise ? 'raise' : 'bet'}`;

function monteCarloEquity(heroCombo, villainCombos, board, trials = 250) {
  if (villainCombos.length === 0) return { equity: 0.5, samples: 0 };
  const dead = new Set([...heroCombo, ...board].map(c => c.rank + c.suit));
  const fullDeck = [];
  RANKS.forEach(r => SUITS.forEach(s => { if (!dead.has(r + s)) fullDeck.push({ rank: r, suit: s }); }));
  const need = 5 - board.length;
  let wins = 0, ties = 0;
  for (let t = 0; t < trials; t++) {
    const vc = villainCombos[Math.floor(Math.random() * villainCombos.length)];
    const vk1 = vc[0].rank + vc[0].suit, vk2 = vc[1].rank + vc[1].suit;
    const deck = [];
    for (let i = 0; i < fullDeck.length; i++) {
      const c = fullDeck[i];
      const tk = c.rank + c.suit;
      if (tk !== vk1 && tk !== vk2) deck.push(c);
    }
    const runout = [];
    for (let i = 0; i < need; i++) {
      const idx = Math.floor(Math.random() * deck.length);
      runout.push(deck[idx]);
      deck.splice(idx, 1);
    }
    const finalBoard = [...board, ...runout];
    const hs = rank7([...heroCombo, ...finalBoard]);
    const vs = rank7([...vc, ...finalBoard]);
    if (hs > vs) wins++;
    else if (hs === vs) ties++;
  }
  return { equity: (wins + ties * 0.5) / trials, samples: trials, mode: 'mc' };
}

function chooseCount(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  let out = 1;
  for (let i = 1; i <= k; i++) out = (out * (n - k + i)) / i;
  return out;
}

function makeDeckExcluding(keys) {
  const deck = [];
  RANKS.forEach(rank => SUITS.forEach(suit => {
    if (!keys.has(rank + suit)) deck.push({ rank, suit });
  }));
  return deck;
}

function scoreShowdown(heroCombo, villainCombo, finalBoard) {
  const heroScore = rank7([...heroCombo, ...finalBoard]);
  const villainScore = rank7([...villainCombo, ...finalBoard]);
  if (heroScore > villainScore) return 1;
  if (heroScore === villainScore) return 0.5;
  return 0;
}

function exactEquity(heroCombo, villainCombos, board) {
  const baseDead = new Set([...heroCombo, ...board].map(c => c.rank + c.suit));
  const need = 5 - board.length;
  let total = 0;
  let equityPoints = 0;

  for (const villainCombo of villainCombos) {
    const v1 = villainCombo[0].rank + villainCombo[0].suit;
    const v2 = villainCombo[1].rank + villainCombo[1].suit;
    if (baseDead.has(v1) || baseDead.has(v2)) continue;

    const dead = new Set([...baseDead, v1, v2]);
    const deck = makeDeckExcluding(dead);

    if (need === 0) {
      equityPoints += scoreShowdown(heroCombo, villainCombo, board);
      total += 1;
    } else if (need === 1) {
      for (let i = 0; i < deck.length; i++) {
        equityPoints += scoreShowdown(heroCombo, villainCombo, [...board, deck[i]]);
        total += 1;
      }
    } else {
      for (let i = 0; i < deck.length - 1; i++) {
        for (let j = i + 1; j < deck.length; j++) {
          equityPoints += scoreShowdown(heroCombo, villainCombo, [...board, deck[i], deck[j]]);
          total += 1;
        }
      }
    }
  }

  return { equity: total ? equityPoints / total : 0.5, samples: total, mode: 'exact' };
}

function comboVsComboEquity(heroCombo, villainCombo, board) {
  const cacheKey = `hu|${comboKey(heroCombo)}|${comboKey(villainCombo)}|${board.map(cardKey).join('')}`;
  if (HEADS_UP_EQUITY_CACHE.has(cacheKey)) return HEADS_UP_EQUITY_CACHE.get(cacheKey);

  const dead = new Set([...heroCombo, ...villainCombo, ...board].map(c => c.rank + c.suit));
  const deck = makeDeckExcluding(dead);
  const need = 5 - board.length;
  const totalRunouts = need === 0 ? 1 : chooseCount(deck.length, need);
  const sampleEvery = totalRunouts > HEADS_UP_RUNOUT_SAMPLES
    ? Math.max(1, Math.floor(totalRunouts / HEADS_UP_RUNOUT_SAMPLES))
    : 1;
  let seen = 0;
  let used = 0;
  let equityPoints = 0;

  const addRunout = (runout) => {
    if (seen % sampleEvery === 0 && used < HEADS_UP_RUNOUT_SAMPLES) {
      equityPoints += scoreShowdown(heroCombo, villainCombo, [...board, ...runout]);
      used += 1;
    }
    seen += 1;
  };

  if (need === 0) {
    addRunout([]);
  } else if (need === 1) {
    for (let i = 0; i < deck.length; i++) addRunout([deck[i]]);
  } else {
    for (let i = 0; i < deck.length - 1; i++) {
      for (let j = i + 1; j < deck.length; j++) addRunout([deck[i], deck[j]]);
    }
  }

  return rememberHeadsUpEquity(cacheKey, used ? equityPoints / used : 0.5);
}

function calculateEquity(heroCombo, villainCombos, board) {
  if (villainCombos.length === 0) return { equity: 0.5, samples: 0, mode: 'none' };
  const cacheKey = equityCacheKey(heroCombo, villainCombos, board);
  if (EQUITY_CACHE.has(cacheKey)) return EQUITY_CACHE.get(cacheKey);
  const need = 5 - board.length;
  const dead = new Set([...heroCombo, ...board].map(c => c.rank + c.suit));
  const deckSizeAfterHeroBoard = 52 - dead.size - 2;
  const runoutsPerCombo = need === 0 ? 1 : chooseCount(deckSizeAfterHeroBoard, need);
  const exactEvalCount = villainCombos.length * runoutsPerCombo;
  if (need <= 2 && exactEvalCount <= EQUITY_EXACT_EVAL_LIMIT) {
    return rememberEquity(cacheKey, exactEquity(heroCombo, villainCombos, board));
  }
  return rememberEquity(cacheKey, monteCarloEquity(heroCombo, villainCombos, board, EQUITY_MONTE_CARLO_TRIALS));
}

// ============================================================
// RANGE NARROWING (based on villain's prior-street actions)
// ============================================================

function boardThreatSuit(board) {
  const suitCounts = {};
  board.forEach(card => { suitCounts[card.suit] = (suitCounts[card.suit] || 0) + 1; });
  let bestSuit = null;
  let bestCount = 0;
  Object.entries(suitCounts).forEach(([suit, count]) => {
    if (count > bestCount) {
      bestSuit = suit;
      bestCount = count;
    }
  });
  return bestCount >= 2 ? bestSuit : null;
}

function scoreVillainActionCombo(combo, board, texture, threatSuit = boardThreatSuit(board)) {
  const e = evalHand(combo, board);
  const ranks = combo.map(card => RANK_VAL[card.rank]);
  const overcards = ranks.filter(rank => rank > texture.highCard).length;
  const nutFlushBlocker = threatSuit && combo.some(card => card.rank === 'A' && card.suit === threatSuit);
  const highCardBlocker = ranks.includes(14) ? 2.8 : ranks.includes(13) ? 1.4 : 0;
  const blockerScore = highCardBlocker + (nutFlushBlocker ? 3.4 : 0);
  const drawScore =
    (e.flushDraw ? 11 : 0) +
    (e.oesd ? 10 : 0) +
    (e.gutshot ? 4.2 : 0) +
    (e.backdoorFD ? 1.8 : 0);
  const lowShowdownScore = Math.max(0, 55 - e.strength) * 0.10;
  const madeHandPenalty = e.strength >= 55 ? -3.5 : 0;

  return {
    c: combo,
    e,
    valueScore: e.strength + drawScore * 0.18 + blockerScore * 0.35 + overcards * 0.8,
    continueScore: e.strength + drawScore * 0.65 + blockerScore * 0.35 + overcards * 0.7,
    semiBluffScore: drawScore * 2.5 + blockerScore + overcards * 1.3 + Math.max(0, 70 - e.strength) * 0.06,
    bluffScore: blockerScore * 1.8 + drawScore * 0.9 + overcards * 1.2 + lowShowdownScore + madeHandPenalty,
    isSemiBluff: (e.flushDraw || e.oesd || e.gutshot || (e.backdoorFD && overcards > 0)) && e.strength < 82,
    isBluffCandidate: e.strength < 48 || e.flushDraw || e.oesd || e.gutshot || blockerScore >= 2.5,
  };
}

function actionComboCount(total, pct, min = 0) {
  return Math.max(min, Math.min(total, Math.round(total * pct)));
}

function addTopActionCombos(keepers, scored, count, scorer, predicate = () => true) {
  if (count <= 0) return;
  [...scored]
    .filter(item => !keepers.has(item.c) && predicate(item))
    .sort((a, b) => scorer(b) - scorer(a))
    .slice(0, count)
    .forEach(item => keepers.add(item.c));
}

function narrowVillainCombos(combos, board, villainAction) {
  if (!villainAction || villainAction.type === 'check' || combos.length === 0) return combos;
  const texture = getBoardTexture(board);
  const threatSuit = boardThreatSuit(board);
  const scored = combos.map(c => scoreVillainActionCombo(c, board, texture, threatSuit));
  const byValue = [...scored].sort((a, b) => b.valueScore - a.valueScore);
  const n = scored.length;

  if (villainAction.type === 'bet') {
    const size = Number(villainAction.size) || 50;
    let valuePct, drawPct, bluffPct;
    if (size <= 33)      { valuePct = 0.54; drawPct = 0.03; bluffPct = 0.06; }
    else if (size <= 50) { valuePct = 0.38; drawPct = 0.07; bluffPct = 0.09; }
    else if (size <= 75) { valuePct = 0.27; drawPct = 0.10; bluffPct = 0.11; }
    else                 { valuePct = 0.18; drawPct = 0.12; bluffPct = 0.13; }

    const wetness = clamp(texture.wetness || 0, -1, 5);
    valuePct += wetness >= 3 ? 0.015 : 0;
    drawPct += Math.max(0, wetness) * 0.008;
    bluffPct += texture.paired ? 0.015 : 0;
    if (texture.monotone) {
      valuePct += 0.02;
      drawPct += 0.02;
      bluffPct -= 0.025;
    }

    const keepers = new Set();
    addTopActionCombos(keepers, scored, actionComboCount(n, clamp(valuePct, 0.12, 0.58), 1), x => x.valueScore);
    addTopActionCombos(keepers, scored, actionComboCount(n, clamp(drawPct, 0.02, 0.18)), x => x.semiBluffScore, x => x.isSemiBluff);
    addTopActionCombos(keepers, scored, actionComboCount(n, clamp(bluffPct, 0.02, 0.16)), x => x.bluffScore, x => x.isBluffCandidate);
    return Array.from(keepers);
  }
  if (villainAction.type === 'raise') {
    const keepers = new Set();
    addTopActionCombos(keepers, scored, actionComboCount(n, 0.12, 1), x => x.valueScore);
    addTopActionCombos(keepers, scored, actionComboCount(n, 0.06), x => x.semiBluffScore, x => x.isSemiBluff);
    addTopActionCombos(keepers, scored, actionComboCount(n, 0.04), x => x.bluffScore, x => x.isBluffCandidate);
    return Array.from(keepers);
  }
  if (villainAction.type === 'threebet') {
    const keepers = new Set();
    addTopActionCombos(keepers, scored, actionComboCount(n, 0.07, 1), x => x.valueScore);
    addTopActionCombos(keepers, scored, actionComboCount(n, 0.035), x => x.bluffScore, x => x.isBluffCandidate);
    return Array.from(keepers);
  }
  if (villainAction.type === 'capped-raise') {
    const start = Math.floor(n * 0.05);
    const end = Math.floor(n * 0.30);
    return byValue.slice(start, end).map(x => x.c);
  }
  if (villainAction.type === 'call') {
    const keepers = new Set();
    const nutCut = new Set(byValue.slice(0, actionComboCount(n, 0.10)).map(x => x.c));
    addTopActionCombos(
      keepers,
      scored,
      actionComboCount(n, 0.58, 1),
      x => x.continueScore,
      x => !nutCut.has(x.c) && (x.e.strength >= 24 || x.isSemiBluff)
    );
    return Array.from(keepers);
  }
  if (villainAction.type === 'capped-bet') {
    const keepers = new Set();
    const start = Math.floor(n * 0.06);
    const end = Math.floor(n * 0.36);
    byValue.slice(start, end).forEach(x => keepers.add(x.c));
    addTopActionCombos(keepers, scored, actionComboCount(n, 0.04), x => x.semiBluffScore, x => x.isSemiBluff);
    return Array.from(keepers);
  }
  return combos;
}

function parseVillainStrongestAction(actionLine, heroIP) {
  if (!actionLine) return null;
  const id = actionLine.id;
  const size = actionLine.betSize;
  if (heroIP) {
    if (id === 'ip-check-check') return { type: 'check' };
    // 3-bet patterns (check BEFORE 2-bet patterns)
    if (id.includes('check-hero-bet') && id.includes('checkraise-3bet-call'))
      return { type: 'capped-raise', size }; // V CR'd, got 3-bet, called -> strong but no nuts
    if (id.includes('villain-bet') && id.includes('hero-raise-3bet-call'))
      return { type: 'threebet', size };     // V bet, got raised, 3-bet -> very polar
    // 2-bet patterns
    if (id.includes('check-hero-bet') && id.includes('checkraise-call')) return { type: 'raise', size };
    if (id.includes('check-hero-bet') && id.endsWith('-call')) return { type: 'call', size };
    if (id.includes('villain-bet') && id.includes('hero-raise-call')) return { type: 'capped-bet', size };
    if (id.includes('villain-bet')) return { type: 'bet', size };
  } else {
    if (id === 'oop-check-check') return { type: 'check' };
    // 3-bet patterns
    if (id.includes('hero-check-villain-bet') && id.includes('checkraise-3bet-call'))
      return { type: 'threebet', size };     // V bet, got CR'd, 3-bet -> very polar
    if (id.includes('hero-bet') && id.includes('villain-raise-3bet-call'))
      return { type: 'capped-raise', size }; // V raised, got 3-bet, called -> strong but no nuts
    // 2-bet patterns
    if (id.includes('hero-check-villain-bet') && id.includes('checkraise-call')) return { type: 'capped-bet', size };
    if (id.includes('hero-check-villain-bet')) return { type: 'bet', size };
    if (id.includes('hero-bet') && id.includes('villain-raise-call')) return { type: 'raise', size };
    if (id.includes('hero-bet') && id.endsWith('-villain-call')) return { type: 'call', size };
  }
  return null;
}

function getNarrowedVillainCombos(ctx) {
  // Single source of truth for villain's range at the current node.
  // Applies preflop range + prior-street narrowing + CURRENT decision narrowing.
  const dead = [...(ctx.combo || []), ...(ctx.boardCards || [])];
  let combos = expandRangeToCombos(resolveVillainPreflopRange(ctx.preflopAction, ctx.heroPos), dead);
  if (combos.length === 0) return [];

  if (ctx.flopAction && ctx.boardCards.length >= 3) {
    combos = narrowVillainCombos(combos, ctx.boardCards.slice(0, 3), parseVillainStrongestAction(ctx.flopAction, ctx.heroIP));
  }
  if (ctx.turnAction && ctx.boardCards.length >= 4) {
    combos = narrowVillainCombos(combos, ctx.boardCards.slice(0, 4), parseVillainStrongestAction(ctx.turnAction, ctx.heroIP));
  }

  // Current-street narrowing implied by the decision node hero is at.
  if (ctx.currentDecision) {
    if (ctx.currentDecision.type === 'facing-bet') {
      combos = narrowVillainCombos(combos, ctx.boardCards, { type: 'bet', size: ctx.currentDecision.betSize });
    } else if (ctx.currentDecision.type === 'facing-raise') {
      combos = narrowVillainCombos(combos, ctx.boardCards, { type: 'raise', size: ctx.currentDecision.initialBetSize });
    } else if (ctx.currentDecision.type === 'facing-3bet') {
      combos = narrowVillainCombos(combos, ctx.boardCards, { type: 'threebet', size: ctx.currentDecision.initialBetSize });
    }
  }
  return combos;
}

function describeVillainRange(ctx) {
  const villain = ctx.villainPos || 'Villain';
  const decision = ctx.currentDecision;
  if (!decision) return `${villain} preflop range`;
  if (decision.type === 'facing-bet') {
    const size = decision.betSize ? `${decision.betSize}% pot bet` : 'bet';
    if (!ctx.heroIP && decision.id?.includes('hero-check')) {
      return `${villain} ${size} range after Hero checks`;
    }
    return `${villain} ${size} range`;
  }
  if (decision.type === 'facing-raise') return `${villain} raise range`;
  if (decision.type === 'facing-3bet') return `${villain} 3-bet range`;
  return `${villain} preflop range`;
}

function computeEquityContext(ctx) {
  const rangeCtx = computeRangeContext(ctx);
  if (rangeCtx.villainCombos.length === 0) return rangeCtx;
  const { equity, samples, mode } = calculateEquity(ctx.combo, rangeCtx.villainCombos, ctx.boardCards);
  return { ...rangeCtx, equity, samples, mode };
}

function computeRangeContext(ctx) {
  if (!ctx.preflopAction || !ctx.combo || !ctx.boardCards || ctx.boardCards.length < 3) {
    return { equity: null, vCount: 0, villainCombos: [], rangeLabel: describeVillainRange(ctx) };
  }
  const combos = getNarrowedVillainCombos(ctx);
  if (combos.length === 0) return { equity: null, vCount: 0, villainCombos: [], rangeLabel: describeVillainRange(ctx) };
  return { equity: null, vCount: combos.length, samples: 0, mode: 'range-only', villainCombos: combos, rangeLabel: describeVillainRange(ctx) };
}

// ============================================================
// RECOMMENDATION ENGINE
// ============================================================

function clamp(value, min = 0, max = 100) {
  return Math.min(max, Math.max(min, value));
}

function formatBB(value) {
  const rounded = Math.round(value * 10) / 10;
  return Number.isInteger(rounded) ? `${rounded}` : `${rounded.toFixed(1)}`;
}

function openingBetBB(ctx, sizePct) {
  return Math.max(0.1, Math.min(ctx.stackBB, ctx.potBB * (sizePct / 100)));
}

function getFacingBetGeometry(ctx) {
  const sizePct = ctx.currentDecision.betSize || 50;
  const villainBet = openingBetBB(ctx, sizePct);
  const raiseTo = Math.min(ctx.stackBB, villainBet * POSTFLOP_RAISE_MULTIPLIER);
  const heroRaiseAdd = Math.max(0, raiseTo - villainBet);
  const villainCallAdd = Math.max(0, raiseTo - villainBet);
  return {
    sizePct,
    villainBet,
    callAmount: villainBet,
    finalPotIfCall: ctx.potBB + 2 * villainBet,
    raiseTo,
    heroRaiseAdd,
    villainCallAdd,
    potAfterHeroRaise: ctx.potBB + villainBet + raiseTo,
    finalPotIfRaiseCalled: ctx.potBB + 2 * raiseTo,
  };
}

function getFacingRaiseGeometry(ctx) {
  const sizePct = ctx.currentDecision.initialBetSize || ctx.currentDecision.betSize || 50;
  const openBet = openingBetBB(ctx, sizePct);
  const heroCurrent = openBet;
  const villainRaiseTo = Math.min(ctx.stackBB, openBet * POSTFLOP_RAISE_MULTIPLIER);
  const hero3BetTo = Math.min(ctx.stackBB, openBet * POSTFLOP_3BET_MULTIPLIER);
  const callAmount = Math.max(0, villainRaiseTo - heroCurrent);
  const hero3BetAdd = Math.max(0, hero3BetTo - heroCurrent);
  const villainCallAdd = Math.max(0, hero3BetTo - villainRaiseTo);
  return {
    sizePct,
    openBet,
    heroCurrent,
    villainRaiseTo,
    hero3BetTo,
    callAmount,
    hero3BetAdd,
    villainCallAdd,
    potAtDecision: ctx.potBB + heroCurrent + villainRaiseTo,
    finalPotIfCall: ctx.potBB + 2 * villainRaiseTo,
    finalPotIf3BetCalled: ctx.potBB + 2 * hero3BetTo,
  };
}

function getFacing3BetGeometry(ctx) {
  const sizePct = ctx.currentDecision.initialBetSize || 50;
  const openBet = openingBetBB(ctx, sizePct);
  const heroRaiseTo = Math.min(ctx.stackBB, openBet * POSTFLOP_RAISE_MULTIPLIER);
  const villain3BetTo = Math.min(ctx.stackBB, openBet * POSTFLOP_3BET_MULTIPLIER);
  const callAmount = Math.max(0, villain3BetTo - heroRaiseTo);
  const heroJamDelta = Math.max(0, ctx.stackBB - heroRaiseTo);
  const villainJamCallDelta = Math.max(0, ctx.stackBB - villain3BetTo);
  return {
    sizePct,
    openBet,
    heroRaiseTo,
    villain3BetTo,
    callAmount,
    heroJamDelta,
    villainJamCallDelta,
    potAtDecision: ctx.potBB + heroRaiseTo + villain3BetTo,
    finalPotIfCall: ctx.potBB + 2 * villain3BetTo,
    finalPotIfJamCalled: ctx.potBB + heroRaiseTo + villain3BetTo + heroJamDelta + villainJamCallDelta,
  };
}

function colorForAction(name) {
  const lower = name.toLowerCase();
  if (lower.includes('fold')) return ACTION_COLORS.fold;
  if (lower.includes('call')) return ACTION_COLORS.call;
  if (lower.includes('check')) return ACTION_COLORS.check;
  if (lower.includes('raise')) return ACTION_COLORS.raise;
  return ACTION_COLORS.bet;
}

function normalizeActions(actions) {
  const cleaned = actions.map(action => ({
    ...action,
    pct: Math.max(0, Number(action.pct) || 0),
    color: action.color || colorForAction(action.name),
  }));
  const total = cleaned.reduce((sum, action) => sum + action.pct, 0);
  if (total <= 0) return cleaned.map(action => ({ ...action, pct: 0 }));

  const normalized = cleaned.map(action => ({
    ...action,
    pct: Math.round((action.pct / total) * 100),
  }));
  const diff = 100 - normalized.reduce((sum, action) => sum + action.pct, 0);
  if (diff !== 0) {
    let target = 0;
    normalized.forEach((action, idx) => {
      if (action.pct > normalized[target].pct) target = idx;
    });
    normalized[target] = { ...normalized[target], pct: normalized[target].pct + diff };
  }
  return normalized;
}

function cardToken(card) {
  return `${card.rank}${card.suit}`;
}

function cardsToToken(cards) {
  return cards.map(cardToken).join('');
}

function buildGtoNodeKey(ctx) {
  const parts = [
    '8max-hu',
    ctx.street,
    `${ctx.heroPos}-vs-${ctx.villainPos}`,
    ctx.preflopAction?.id || 'no-preflop-line',
    ctx.flopAction?.id || 'no-flop-line',
    ctx.turnAction?.id || 'no-turn-line',
    cardsToToken(ctx.boardCards),
    cardsToToken(ctx.combo),
    ctx.currentDecision?.id || 'no-decision',
  ];
  return parts.join('|');
}

function comboNotation(combo) {
  if (!Array.isArray(combo) || combo.length !== 2) return 'unknown-hand';
  const [a, b] = combo;
  const first = RANK_VAL[a.rank] >= RANK_VAL[b.rank] ? a : b;
  const second = first === a ? b : a;
  if (first.rank === second.rank) return `${first.rank}${second.rank}`;
  return `${first.rank}${second.rank}${first.suit === second.suit ? 's' : 'o'}`;
}

function boardSuitClass(board) {
  const suitCounts = {};
  board.forEach(card => { suitCounts[card.suit] = (suitCounts[card.suit] || 0) + 1; });
  const maxSuit = Math.max(0, ...Object.values(suitCounts));
  if (maxSuit >= 3) return 'monotone';
  if (maxSuit === 2) return 'two-tone';
  return 'rainbow';
}

function boardPairClass(board) {
  const rankCounts = {};
  board.forEach(card => { rankCounts[card.rank] = (rankCounts[card.rank] || 0) + 1; });
  const maxPair = Math.max(0, ...Object.values(rankCounts));
  if (maxPair >= 3) return 'trips';
  if (maxPair === 2) return 'paired';
  return 'unpaired';
}

function boardHighCardClass(highCard) {
  if (highCard >= 14) return 'a-high';
  if (highCard >= 13) return 'k-high';
  if (highCard >= 12) return 'q-high';
  if (highCard >= 10) return 'broadway-high';
  return 'low-high';
}

function boardWetnessClass(texture) {
  if (texture.wetness >= 4) return 'wet';
  if (texture.wetness >= 2) return 'dynamic';
  return 'dry';
}

function boardConnectedClass(texture) {
  if (texture.connected >= 3) return 'very-connected';
  if (texture.connected >= 2) return 'connected';
  if (texture.connected === 1) return 'semi-connected';
  return 'disconnected';
}

function buildBoardClass(board) {
  if (!Array.isArray(board) || board.length < 3) return 'no-board';
  const texture = getBoardTexture(board);
  return [
    board.length === 3 ? 'flop' : board.length === 4 ? 'turn' : 'river',
    boardHighCardClass(texture.highCard),
    boardSuitClass(board),
    boardPairClass(board),
    boardConnectedClass(texture),
    boardWetnessClass(texture),
  ].join('-');
}

function streetActionClass(action) {
  if (!action) return 'none';
  if (action.threeBet) return `threebet-${action.betSize || action.initialBetSize || 'x'}-call`;
  if (action.raised) return `raise-${action.betSize || action.initialBetSize || 'x'}-call`;
  if (action.betSize) return `bet-${action.betSize}-call`;
  if (action.type === 'check-check') return 'check-check';
  return action.id || 'custom-action';
}

function decisionClass(decision) {
  if (!decision) return 'no-decision';
  if (decision.type === 'facing-bet') return `facing-bet-${decision.betSize || 'x'}`;
  if (decision.type === 'facing-raise') return `facing-raise-${decision.initialBetSize || 'x'}`;
  if (decision.type === 'facing-3bet') return `facing-3bet-${decision.initialBetSize || 'x'}`;
  return decision.type || decision.id || 'decision';
}

function buildAbstractSpotKey(ctx) {
  const initiative = ctx.preflopAction?.aggressor === ctx.heroPos ? 'hero-pfa' : 'villain-pfa';
  const potType = ctx.preflopAction?.potType || 'unknown-pot';
  const parts = [
    '8max-hu-common',
    ctx.street,
    potType,
    ctx.heroIP ? 'hero-ip' : 'hero-oop',
    initiative,
    `${ctx.heroPos}-vs-${ctx.villainPos}`,
    streetActionClass(ctx.flopAction),
    streetActionClass(ctx.turnAction),
    buildBoardClass(ctx.boardCards),
    comboNotation(ctx.combo),
    decisionClass(ctx.currentDecision),
  ];
  return parts.join('|');
}

function normalizeSolverNode(node, nodeKey, sourceLabelOverride = null, abstractKey = null) {
  const rawActions = Array.isArray(node) ? node : node?.actions;
  if (!Array.isArray(rawActions) || rawActions.length === 0) return null;

  const actions = normalizeActions(rawActions.map(action => {
    const rawPct = action.pct ?? action.frequency ?? action.freq ?? action.strategy ?? action.weight ?? 0;
    const size = action.sizePct ?? action.size;
    return {
      name: action.name || action.action || action.label || 'Action',
      pct: Number(rawPct) || 0,
      detail: action.detail || (size ? `${size}% pot` : 'solver frequency'),
      color: action.color,
    };
  }));

  return {
    type: 'solver-node',
    source: 'exact',
    sourceLabel: sourceLabelOverride || (node?.solver ? `Exact GTO - ${node.solver}` : 'Exact GTO solver node'),
    confidenceLabel: 'Exact solved spot',
    nodeLabel: node?.label || node?.node || nodeKey,
    nodeKey,
    abstractKey,
    actions,
  };
}

function lookupSolverNode(nodeKey, abstractKey = null) {
  if (GTO_NODE_LIBRARY[nodeKey]) {
    return { node: GTO_NODE_LIBRARY[nodeKey], sourceLabel: 'Exact GTO - built-in node' };
  }
  if (typeof window !== 'undefined' && window.GTO_SOLVER_NODES?.[nodeKey]) {
    return { node: window.GTO_SOLVER_NODES[nodeKey], sourceLabel: 'Exact GTO - external node' };
  }
  if (abstractKey && PRESOLVED_COMMON_LIBRARY[abstractKey]) {
    return { node: PRESOLVED_COMMON_LIBRARY[abstractKey], sourceLabel: 'Pre-solved common spot - built-in library' };
  }
  if (typeof window !== 'undefined' && abstractKey && window.PRESOLVED_GTO_LIBRARY?.[abstractKey]) {
    return { node: window.PRESOLVED_GTO_LIBRARY[abstractKey], sourceLabel: 'Pre-solved common spot - external library' };
  }
  return null;
}

function parseSolverNodeJson(raw) {
  if (!raw.trim()) return { node: null, error: null };
  try {
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object') return { node: null, error: 'Expected solver node JSON.' };
    const hasSingleNode = Array.isArray(parsed) || Array.isArray(parsed.actions);
    const hasNodeMap = parsed.nodes || parsed.abstractNodes || parsed.abstract ||
      Object.values(parsed).some(value => Array.isArray(value?.actions));
    if (!hasSingleNode && !hasNodeMap) {
      return { node: null, error: 'Expected an actions array, exact node map, or abstract common-spot map.' };
    }
    return { node: parsed, error: null };
  } catch (err) {
    return { node: null, error: 'Solver JSON is not valid yet.' };
  }
}

function resolveInlineSolverNode(inlineSolverData, nodeKey, abstractKey = null) {
  if (!inlineSolverData) return null;
  if (Array.isArray(inlineSolverData) || Array.isArray(inlineSolverData.actions)) return inlineSolverData;
  if (inlineSolverData.nodeKey === nodeKey && Array.isArray(inlineSolverData.actions)) return inlineSolverData;
  if (inlineSolverData.nodes?.[nodeKey]) return inlineSolverData.nodes[nodeKey];
  if (abstractKey && inlineSolverData.abstractNodes?.[abstractKey]) return inlineSolverData.abstractNodes[abstractKey];
  if (abstractKey && inlineSolverData.abstract?.[abstractKey]) return inlineSolverData.abstract[abstractKey];
  if (inlineSolverData[nodeKey]) return inlineSolverData[nodeKey];
  if (abstractKey && inlineSolverData[abstractKey]) return inlineSolverData[abstractKey];
  return null;
}

// ============================================================
// SOLVER-LIKE STRATEGY ESTIMATOR
// ============================================================
// Equity is calculated separately for study context. The fallback strategy below
// is intentionally node/range driven: preflop path, position, pot type, board
// class, SPR, hand class, blockers, and range/nut advantage shape frequencies.

function rankValues(board) {
  return board.map(card => RANK_VAL[card.rank]).sort((a, b) => b - a);
}

function countBroadways(board) {
  return board.filter(card => RANK_VAL[card.rank] >= 10).length;
}

function classifyBoardTexture(board) {
  const texture = getBoardTexture(board);
  const ranks = rankValues(board);
  const high = ranks[0] || 0;
  const low = ranks[ranks.length - 1] || 0;
  const broadways = countBroadways(board);
  const paired = texture.paired;
  const monotone = texture.monotone;
  const twoTone = texture.twoTone;
  const dry = !paired && !monotone && texture.connected <= 1 && texture.wetness <= 1;
  const dryAHigh = dry && high === 14;
  const dryKHigh = dry && high === 13;
  const twoToneBroadway = twoTone && broadways >= 2;
  const lowConnected = !paired && texture.connected >= 1 && high <= 8;
  const middleConnected = !paired && texture.connected >= 1 && high >= 9 && high <= 11;
  const highConnected = !paired && (texture.connected >= 2 || (texture.connected >= 1 && broadways >= 2)) && high >= 11;
  const dynamicWetBoard = monotone || twoToneBroadway || (twoTone && texture.connected >= 1) || texture.connected >= 2;

  let primary = 'neutral';
  if (paired) primary = 'paired';
  else if (monotone) primary = 'monotone';
  else if (dryAHigh) primary = 'dry A-high';
  else if (dryKHigh) primary = 'dry K-high';
  else if (twoToneBroadway) primary = 'two-tone broadway';
  else if (lowConnected) primary = 'low connected';
  else if (middleConnected) primary = 'middle connected';
  else if (highConnected) primary = 'high connected';
  else if (dynamicWetBoard) primary = 'dynamic wet board';

  return {
    ...texture,
    ranks,
    high,
    low,
    broadways,
    dry,
    dryAHigh,
    dryKHigh,
    paired,
    monotone,
    twoTone,
    twoToneBroadway,
    lowConnected,
    middleConnected,
    highConnected,
    dynamicWetBoard,
    primary,
  };
}

function classifyStrategyHand(combo, board) {
  const e = evalHand(combo, board);
  const boardInfo = classifyBoardTexture(board);
  const ranks = combo.map(card => RANK_VAL[card.rank]);
  const overcards = ranks.filter(rank => rank > boardInfo.high).length;
  const threatSuit = boardThreatSuit(board);
  const nutFlushBlocker = threatSuit && combo.some(card => card.rank === 'A' && card.suit === threatSuit);
  const hasAceBlocker = combo.some(card => card.rank === 'A');
  const hasKingBlocker = combo.some(card => card.rank === 'K');
  const blockerScore = (hasAceBlocker ? 2 : 0) + (hasKingBlocker ? 1 : 0) + (nutFlushBlocker ? 3 : 0);
  const strongDraw = (e.flushDraw && (e.oesd || e.gutshot || overcards > 0)) || (e.oesd && overcards > 0);
  const mediumDraw = e.flushDraw || e.oesd || e.gutshot || e.backdoorFD;
  const nutted = e.made === 'full-house' || e.made === 'flush' || e.made === 'straight' || e.made === 'set';
  const strongValue = nutted || e.made === 'overpair' || e.made === 'two-pair' ||
    (e.made === 'top-pair' && e.strength >= 64);
  const mediumShowdown = !strongValue && (
    e.made === 'top-pair' ||
    e.made === 'middle-pair' ||
    e.made === 'pp-middle' ||
    e.made === 'bottom-pair' ||
    e.made === 'pp-under'
  );
  const weakShowdown = e.made === 'paired-board' || e.made === 'high-card';

  let handClass = 'air';
  if (nutted) handClass = 'nutted value';
  else if (strongValue) handClass = 'strong value';
  else if (strongDraw) handClass = 'strong draw';
  else if (mediumShowdown) handClass = 'showdown value';
  else if (mediumDraw) handClass = 'draw';
  else if (weakShowdown && overcards > 0) handClass = 'overcards';

  return {
    eval: e,
    handClass,
    nutted,
    strongValue,
    mediumShowdown,
    weakShowdown,
    strongDraw,
    mediumDraw,
    overcards,
    hasAceBlocker,
    hasKingBlocker,
    nutFlushBlocker,
    blockerScore,
  };
}

function estimatePreflopRangeShape(ctx) {
  if (!ctx?.preflopAction || !ctx.heroPos) return { range: 0, nut: 0 };
  const heroRange = resolveHeroPreflopRange(ctx.preflopAction, ctx.heroPos);
  const villainRange = resolveVillainPreflopRange(ctx.preflopAction, ctx.heroPos);
  const heroCombos = rangeComboCount(heroRange);
  const villainCombos = rangeComboCount(villainRange);
  if (!heroCombos || !villainCombos) return { range: 0, nut: 0 };

  const density = Math.log((villainCombos + 1) / (heroCombos + 1));
  const heroPremiums = ['AA', 'KK', 'QQ', 'AKs', 'AKo'].filter(hand => heroRange.has(hand)).length;
  const villainPremiums = ['AA', 'KK', 'QQ', 'AKs', 'AKo'].filter(hand => villainRange.has(hand)).length;

  return {
    range: clamp(density * 9, -10, 10),
    nut: clamp((heroPremiums - villainPremiums) * 2.2, -6, 6),
  };
}

function estimateStrategicAdvantages(ctx, boardInfo) {
  const heroPfa = ctx.preflopAction?.aggressor === ctx.heroPos;
  const potType = ctx.preflopAction?.potType || 'SRP';
  const rangeShape = estimatePreflopRangeShape(ctx);
  let rangeAdvantage = heroPfa ? 14 : -14;
  let nutAdvantage = heroPfa ? 8 : -4;

  if (potType === '3BP') {
    rangeAdvantage += heroPfa ? 14 : -10;
    nutAdvantage += heroPfa ? 8 : -5;
  } else if (potType === '4BP') {
    rangeAdvantage += heroPfa ? 22 : -14;
    nutAdvantage += heroPfa ? 14 : -8;
  }

  if (boardInfo.dryAHigh || boardInfo.dryKHigh) {
    rangeAdvantage += heroPfa ? 16 : -12;
    nutAdvantage += heroPfa ? 5 : -2;
  }
  if (boardInfo.lowConnected || boardInfo.middleConnected) {
    rangeAdvantage += heroPfa ? -18 : 12;
    nutAdvantage += heroPfa ? -14 : 12;
  }
  if (boardInfo.highConnected || boardInfo.twoToneBroadway) {
    rangeAdvantage += heroPfa ? -10 : 8;
    nutAdvantage += heroPfa ? -10 : 8;
  }
  if (boardInfo.monotone) {
    rangeAdvantage -= 5;
    nutAdvantage -= 3;
  }
  if (boardInfo.paired) {
    rangeAdvantage += heroPfa ? 7 : -2;
    nutAdvantage += heroPfa ? 3 : 0;
  }
  if (ctx.heroIP) rangeAdvantage += 4;
  rangeAdvantage += rangeShape.range;
  nutAdvantage += rangeShape.nut;

  return {
    rangeAdvantage: clamp(rangeAdvantage, -40, 45),
    nutAdvantage: clamp(nutAdvantage, -35, 40),
  };
}

function buildStrategyProfile(ctx) {
  const boardInfo = classifyBoardTexture(ctx.boardCards || []);
  const hand = classifyStrategyHand(ctx.combo || [], ctx.boardCards || []);
  const heroPfa = ctx.preflopAction?.aggressor === ctx.heroPos;
  const potType = ctx.preflopAction?.potType || 'SRP';
  const spr = ctx.potBB > 0 ? ctx.stackBB / ctx.potBB : 10;
  const isBBVsButtonSRP = potType === 'SRP' && ctx.heroPos === 'BB' && ctx.villainPos === 'BTN';
  const isDonkNode = ctx.currentDecision?.type === 'first-to-act' && !heroPfa;
  const isPfrCbetNode = heroPfa && (ctx.currentDecision?.type === 'first-to-act' || ctx.currentDecision?.type === 'checked-to');
  const isOopPfrMiddlingWet = isPfrCbetNode && !ctx.heroIP &&
    (boardInfo.middleConnected || boardInfo.lowConnected || boardInfo.dynamicWetBoard);
  const advantages = estimateStrategicAdvantages(ctx, boardInfo);
  const closeApprox = ctx.street === 'flop' &&
    ['SRP', '3BP', '4BP'].includes(potType) &&
    ['first-to-act', 'checked-to', 'facing-bet', 'facing-raise', 'facing-3bet'].includes(ctx.currentDecision?.type);

  return {
    ctx,
    boardInfo,
    hand,
    heroPfa,
    potType,
    spr,
    isBBVsButtonSRP,
    isDonkNode,
    isPfrCbetNode,
    isOopPfrMiddlingWet,
    confidenceLabel: closeApprox ? 'Close approximation' : 'Heuristic only',
    ...advantages,
  };
}

function percentMapToActions(entries) {
  return normalizeActions(entries.map(entry => ({
    name: entry.name,
    pct: Math.round(entry.pct || 0),
    detail: entry.detail,
    color: entry.color,
  })));
}

function distributeByWeights(totalPct, weights) {
  const totalWeight = Object.values(weights).reduce((sum, value) => sum + Math.max(0, value), 0);
  if (totalWeight <= 0 || totalPct <= 0) {
    return Object.fromEntries(Object.keys(weights).map(key => [key, 0]));
  }
  const raw = Object.entries(weights).map(([key, value]) => [key, totalPct * Math.max(0, value) / totalWeight]);
  const rounded = Object.fromEntries(raw.map(([key, value]) => [key, Math.floor(value)]));
  let remainder = Math.round(totalPct) - Object.values(rounded).reduce((sum, value) => sum + value, 0);
  raw
    .map(([key, value]) => [key, value - Math.floor(value)])
    .sort((a, b) => b[1] - a[1])
    .forEach(([key]) => {
      if (remainder > 0) {
        rounded[key] += 1;
        remainder -= 1;
      }
    });
  return rounded;
}

function bettingSizeWeights(profile) {
  const { boardInfo, hand, potType, rangeAdvantage, nutAdvantage } = profile;
  let weights = { 25: 35, 50: 35, 75: 20, 100: 10 };

  // Solver pattern: dry A/K-high boards with PFR range advantage use frequent
  // small bets; pot-size betting is a rare polar branch, not the default.
  if (boardInfo.dryAHigh || boardInfo.dryKHigh || boardInfo.paired) {
    weights = { 25: 62, 50: 28, 75: 8, 100: 2 };
  } else if (boardInfo.monotone) {
    weights = { 25: 36, 50: 43, 75: 18, 100: 3 };
  } else if (boardInfo.middleConnected || boardInfo.lowConnected || boardInfo.highConnected || boardInfo.twoToneBroadway) {
    weights = { 25: 18, 50: 38, 75: 34, 100: 10 };
  }

  if (potType === '3BP' || potType === '4BP') {
    weights[25] += 8;
    weights[50] += 10;
    weights[100] = Math.max(1, weights[100] - 5);
  }
  if (hand.nutted && nutAdvantage > 8 && !boardInfo.dryAHigh && !boardInfo.dryKHigh) {
    weights[75] += 10;
    weights[100] += 4;
  }
  if (hand.strongDraw && !profile.ctx.heroIP) {
    weights[25] += 10;
    weights[100] = Math.max(1, weights[100] - 5);
  }
  if (rangeAdvantage > 20 && (boardInfo.dryAHigh || boardInfo.dryKHigh)) {
    weights[25] += 15;
    weights[75] = Math.max(1, weights[75] - 5);
    weights[100] = 1;
  }
  return weights;
}

function clampBettingFrequency(profile, betFreq) {
  const flags = [];
  let out = betFreq;
  const specialDonkBoard = profile.boardInfo.paired || profile.boardInfo.lowConnected || profile.boardInfo.middleConnected;

  if (profile.isBBVsButtonSRP && profile.isDonkNode) {
    const maxDonk = specialDonkBoard ? 20 : 12;
    if (out > maxDonk) flags.push(`BB donk capped at ${maxDonk}% in SRP`);
    out = Math.min(out, maxDonk);
  }
  if (profile.isOopPfrMiddlingWet) {
    if (out > 42) flags.push('OOP PFR reduced on connected middling/wet board');
    out = Math.min(out, 42);
  }
  if (profile.boardInfo.dynamicWetBoard && profile.hand.mediumShowdown && out > 38) {
    flags.push('medium showdown checks more on dynamic boards');
    out = Math.min(out, 38);
  }
  return { betFreq: clamp(Math.round(out), 0, 96), flags };
}

function estimateBettingFrequency(profile) {
  const { boardInfo, hand, heroPfa, potType, spr, rangeAdvantage, nutAdvantage } = profile;
  let betFreq = heroPfa ? 52 : 24;

  if (profile.isDonkNode) {
    betFreq = profile.isBBVsButtonSRP ? 8 : 14;
    if (boardInfo.lowConnected || boardInfo.middleConnected || boardInfo.paired) betFreq += 5;
  } else if (heroPfa && profile.ctx.heroIP) {
    if (boardInfo.dryAHigh) betFreq = 82;
    else if (boardInfo.dryKHigh) betFreq = 74;
    else if (boardInfo.paired) betFreq = 62;
    else if (boardInfo.middleConnected || boardInfo.lowConnected || boardInfo.dynamicWetBoard) betFreq = 35;
  } else if (heroPfa && !profile.ctx.heroIP) {
    if (boardInfo.dryAHigh || boardInfo.dryKHigh) betFreq = 58;
    else if (boardInfo.paired) betFreq = 48;
    else if (boardInfo.middleConnected || boardInfo.lowConnected || boardInfo.dynamicWetBoard) betFreq = 30;
  }

  if ((potType === '3BP' || potType === '4BP') && heroPfa) {
    if (boardInfo.dryAHigh || boardInfo.dryKHigh) betFreq = profile.ctx.heroIP ? 82 : 74;
    else if (boardInfo.paired) betFreq = 66;
    else if (boardInfo.dynamicWetBoard) betFreq = 46;
    else betFreq = 62;
  }

  betFreq += rangeAdvantage * 0.35 + nutAdvantage * 0.20;

  if (hand.nutted) betFreq += profile.isDonkNode ? 5 : 14;
  else if (hand.strongValue) betFreq += profile.isDonkNode ? 2 : 9;
  else if (hand.strongDraw) betFreq += profile.ctx.heroIP ? 8 : -5;
  else if (hand.mediumShowdown) betFreq -= boardInfo.dynamicWetBoard ? 12 : 7;
  else if (hand.handClass === 'overcards') betFreq += (profile.ctx.heroIP && heroPfa && !boardInfo.dynamicWetBoard) ? 5 : -5;
  else betFreq -= 6;

  if (hand.nutFlushBlocker && boardInfo.twoTone) betFreq += profile.ctx.heroIP ? 4 : 1;
  if (spr <= 3.2 && (hand.strongValue || hand.strongDraw)) betFreq += 8;
  if (spr >= 9 && !profile.ctx.heroIP && !hand.nutted) betFreq -= 4;

  return clampBettingFrequency(profile, betFreq);
}

function buildBettingStrategy(ctx) {
  const profile = buildStrategyProfile(ctx);
  const { betFreq, flags } = estimateBettingFrequency(profile);
  const checkName = ctx.currentDecision.type === 'checked-to' ? 'Check Back' : 'Check';
  const sizePcts = distributeByWeights(betFreq, bettingSizeWeights(profile));
  const boardLabel = profile.boardInfo.primary;
  const handLabel = profile.hand.handClass;
  const note = `${boardLabel}, ${handLabel}, range adv ${Math.round(profile.rangeAdvantage)}, nut adv ${Math.round(profile.nutAdvantage)}`;

  return {
    profile,
    actions: percentMapToActions([
      { name: 'Bet 25%', pct: sizePcts[25], detail: `${formatBB(ctx.potBB * 0.25)} BB - small range/protection size`, color: ACTION_COLORS.bet },
      { name: 'Bet 50%', pct: sizePcts[50], detail: `${formatBB(ctx.potBB * 0.50)} BB - medium pressure size`, color: ACTION_COLORS.bet },
      { name: 'Bet 75%', pct: sizePcts[75], detail: `${formatBB(ctx.potBB * 0.75)} BB - polar/value-heavy size`, color: ACTION_COLORS.bet },
      { name: 'Bet 100%', pct: sizePcts[100], detail: `${formatBB(ctx.potBB)} BB - rare polar size, clamped away from default`, color: ACTION_COLORS.bet },
      { name: checkName, pct: 100 - betFreq, detail: flags.length ? `${note} - ${flags.join('; ')}` : note, color: ACTION_COLORS.check },
    ]),
  };
}

function responseStrategyVersusBet(ctx) {
  const profile = buildStrategyProfile(ctx);
  const g = getFacingBetGeometry(ctx);
  const size = ctx.currentDecision.betSize || 50;
  const { hand, boardInfo } = profile;
  let raise = 8;
  let call = 42;
  let fold = 50;

  // Solver pattern: OOP strong draws often live in check-call/check-raise,
  // not donk-lead. IP raises less often because position realizes equity.
  if (hand.nutted) {
    raise = profile.ctx.heroIP ? 34 : 48;
    call = 100 - raise;
    fold = 0;
  } else if (hand.strongValue) {
    raise = profile.ctx.heroIP ? 16 : 24;
    call = 72;
    fold = 12;
  } else if (hand.strongDraw) {
    raise = profile.ctx.heroIP ? 18 : 46;
    call = profile.ctx.heroIP ? 72 : 50;
    fold = 100 - raise - call;
  } else if (hand.mediumShowdown) {
    raise = 5;
    call = boardInfo.dynamicWetBoard ? 55 : 68;
    fold = 100 - raise - call;
  } else if (hand.mediumDraw || hand.nutFlushBlocker || hand.overcards >= 2) {
    raise = profile.ctx.heroIP ? 8 : 14;
    call = hand.mediumDraw ? 50 : 34;
    fold = 100 - raise - call;
  }

  if (size >= 75) {
    raise -= hand.nutted || hand.strongDraw ? 4 : 3;
    call -= hand.mediumShowdown || hand.handClass === 'overcards' ? 8 : 4;
    fold = 100 - raise - call;
  }
  if (boardInfo.monotone && !hand.nutFlushBlocker && !hand.nutted) {
    raise = Math.max(0, raise - 6);
    fold = Math.min(100, fold + 6);
  }

  raise = clamp(Math.round(raise), 0, 82);
  call = clamp(Math.round(call), 0, 100 - raise);
  fold = 100 - raise - call;

  return {
    profile,
    actions: percentMapToActions([
      { name: 'Raise 3x', pct: raise, color: ACTION_COLORS.raise, detail: `to ${formatBB(g.raiseTo)} BB - check-raise/value/semi-bluff branch` },
      { name: 'Call', pct: call, color: ACTION_COLORS.call, detail: `${formatBB(g.callAmount)} BB - continue based on class, blockers, and node` },
      { name: 'Fold', pct: fold, color: ACTION_COLORS.fold, detail: 'range bottom / poor blockers' },
    ]),
  };
}

function responseStrategyVersusRaise(ctx) {
  const profile = buildStrategyProfile(ctx);
  const g = getFacingRaiseGeometry(ctx);
  const { hand } = profile;
  let threeBet = hand.nutted ? 32 : hand.strongValue ? 12 : hand.strongDraw ? 18 : hand.nutFlushBlocker ? 7 : 2;
  let call = hand.nutted ? 62 : hand.strongValue ? 70 : hand.strongDraw ? 58 : hand.mediumShowdown ? 42 : hand.mediumDraw ? 34 : 16;
  if (profile.boardInfo.monotone && !hand.nutFlushBlocker && !hand.nutted) call -= 8;
  threeBet = clamp(Math.round(threeBet), 0, 70);
  call = clamp(Math.round(call), 0, 100 - threeBet);
  const fold = 100 - threeBet - call;

  return {
    profile,
    actions: percentMapToActions([
      { name: '3-bet 3x', pct: threeBet, color: ACTION_COLORS.raise, detail: `to ${formatBB(g.hero3BetTo)} BB - polarized continue branch` },
      { name: 'Call', pct: call, color: ACTION_COLORS.call, detail: `${formatBB(g.callAmount)} BB - continue with value/draws` },
      { name: 'Fold', pct: fold, color: ACTION_COLORS.fold, detail: 'range bottom / dominated continues removed' },
    ]),
  };
}

function responseStrategyVersus3Bet(ctx) {
  const profile = buildStrategyProfile(ctx);
  const g = getFacing3BetGeometry(ctx);
  const { hand } = profile;
  let fourBet = hand.nutted ? 38 : hand.strongValue ? 16 : hand.strongDraw && hand.nutFlushBlocker ? 14 : 3;
  let call = hand.nutted ? 54 : hand.strongValue ? 60 : hand.strongDraw ? 50 : hand.mediumDraw ? 28 : 12;
  fourBet = clamp(Math.round(fourBet), 0, 75);
  call = clamp(Math.round(call), 0, 100 - fourBet);
  const fold = 100 - fourBet - call;

  return {
    profile,
    actions: percentMapToActions([
      { name: '4-bet (jam)', pct: fourBet, color: ACTION_COLORS.raise, detail: `jam ${formatBB(g.heroJamDelta)} BB more - polar/value branch` },
      { name: 'Call', pct: call, color: ACTION_COLORS.call, detail: `${formatBB(g.callAmount)} BB - condensed continue branch` },
      { name: 'Fold', pct: fold, color: ACTION_COLORS.fold, detail: 'range bottom versus re-raise' },
    ]),
  };
}

function estimatePostflopStrategy(ctx) {
  if (ctx.currentDecision.type === 'facing-3bet') return responseStrategyVersus3Bet(ctx);
  if (ctx.currentDecision.type === 'facing-raise') return responseStrategyVersusRaise(ctx);
  if (ctx.currentDecision.type === 'facing-bet') return responseStrategyVersusBet(ctx);
  return buildBettingStrategy(ctx);
}

function getFallbackBettingActions(ctx) {
  return buildBettingStrategy(ctx).actions;
}

function getFallbackFacingBetActions(ctx) {
  return responseStrategyVersusBet(ctx).actions;
}

function getFallbackFacingRaiseActions(ctx) {
  return responseStrategyVersusRaise(ctx).actions;
}

function getFallbackFacing3BetActions(ctx) {
  return responseStrategyVersus3Bet(ctx).actions;
}

function getFallbackRecommendation(ctx) {
  const strategy = estimatePostflopStrategy(ctx);
  const profile = strategy.profile;
  const boardLabel = profile?.boardInfo?.primary || 'unclassified board';
  const handLabel = profile?.hand?.handClass || 'unknown hand class';
  return {
    type: ctx.currentDecision.type,
    source: 'fallback',
    sourceLabel: `Solver-like estimate - ${boardLabel} - ${handLabel}`,
    confidenceLabel: profile.confidenceLabel,
    boardClassLabel: boardLabel,
    handClassLabel: handLabel,
    rangeAdvantage: profile.rangeAdvantage,
    nutAdvantage: profile.nutAdvantage,
    nodeKey: ctx.nodeKey || buildGtoNodeKey(ctx),
    abstractKey: ctx.abstractKey || buildAbstractSpotKey(ctx),
    actions: strategy.actions,
  };
}
