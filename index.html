// ============================================================
// LEGACY EV / RESPONSE UTILITIES
// ============================================================
// Kept for experimentation and exact-equity diagnostics. The production
// fallback above no longer maps equity/EV directly into betting frequency.

function estimateVillainResponsesLegacy(villainCombos, board, betSizePct, isFacingHeroRaise) {
  // For each combo, classify how it plays vs a bet of size betSizePct
  // Returns { foldRate, callRate, raiseRate }
  if (villainCombos.length === 0) return { foldRate: 0.5, callRate: 0.45, raiseRate: 0.05 };
  // Required equity to call (in fraction): bet / (pot + 2*bet)
  const reqEqFrac = betSizePct / (100 + 2 * betSizePct);

  let folds = 0, calls = 0, raises = 0;
  for (const combo of villainCombos) {
    const e = evalHand(combo, board);
    // Approximate combo equity vs a generic-strong continuing range
    // Combos with strength >> required equity tend to raise (top tier)
    // Mid combos call, weak combos fold
    const approxEq = Math.max(0, Math.min(1, e.strength / 100));
    const hasDraw = e.flushDraw || e.oesd;
    const drawBoost = hasDraw ? 0.12 : 0;
    const totalEq = approxEq + drawBoost;

    if (isFacingHeroRaise && e.strength >= 92) raises++;
    else if (isFacingHeroRaise && e.strength >= 86 && hasDraw) raises++;
    else if (e.strength >= 85 && !isFacingHeroRaise) raises++;
    else if (e.strength >= 75 && betSizePct >= 75 && !isFacingHeroRaise) raises++;
    else if (totalEq >= reqEqFrac * 1.15) calls++;
    else if (totalEq < reqEqFrac * 0.85) folds++;
    else {
      // Marginal — mix 50/50 (roughly)
      if ((folds + calls + raises) % 2 === 0) calls++; else folds++;
    }
  }
  const total = villainCombos.length;
  return {
    foldRate: folds / total,
    callRate: calls / total,
    raiseRate: raises / total,
  };
}

function responseScore(combo, board, texture, heroCombo = null) {
  const e = evalHand(combo, board);
  const hasDraw = e.flushDraw || e.oesd || e.gutshot;
  const drawScore = (e.flushDraw ? 10 : 0) + (e.oesd ? 9 : 0) + (e.gutshot ? 3 : 0) + (e.backdoorFD ? 1 : 0);
  const blockerScore = combo.some(card => card.rank === 'A') ? 2.2 : 0;
  const wetBoost = texture.wetness >= 3 && hasDraw ? 4 : 0;
  const pairedPenalty = texture.paired && e.made === 'top-pair' ? -2 : 0;
  const equityVsHero = heroCombo
    ? comboVsComboEquity(combo, heroCombo, board)
    : clamp(e.strength / 100, 0, 1);
  const drawEquityBonus = (e.flushDraw ? 0.075 : 0) + (e.oesd ? 0.065 : 0) + (e.gutshot ? 0.025 : 0) + (e.backdoorFD ? 0.01 : 0);
  return {
    combo,
    eval: e,
    hasDraw,
    equityVsHero,
    drawEquityBonus,
    continueScore: equityVsHero * 100 + drawScore * 0.7 + blockerScore + wetBoost * 0.5,
    raiseScore: equityVsHero * 100 + e.strength * 0.35 + drawScore + blockerScore + wetBoost + pairedPenalty,
    score: equityVsHero * 100 + drawScore + blockerScore + wetBoost + pairedPenalty,
  };
}

function estimateVillainResponses(villainCombos, board, betSizePct, isFacingHeroRaise, heroCombo = null) {
  if (villainCombos.length === 0) {
    return { foldRate: 0.5, callRate: 0.45, raiseRate: 0.05, foldCombos: [], callCombos: [], raiseCombos: [] };
  }

  const cacheKey = responseCacheKey(heroCombo, villainCombos, board, betSizePct, isFacingHeroRaise);
  if (RESPONSE_CACHE.has(cacheKey)) return RESPONSE_CACHE.get(cacheKey);

  const texture = getBoardTexture(board);
  const scoreKey = responseScoreCacheKey(heroCombo, villainCombos, board);
  const scored = RESPONSE_SCORE_CACHE.get(scoreKey) ||
    rememberResponseScores(scoreKey, villainCombos.map(combo => responseScore(combo, board, texture, heroCombo)));

  const n = scored.length;
  const mdf = 100 / (100 + betSizePct);
  const priceEquity = betSizePct / (100 + 2 * betSizePct);
  const textureBoost = clamp(texture.wetness, 0, 5) * 0.02;
  const pairedAdjustment = texture.paired ? -0.035 : 0;
  const continueTarget = isFacingHeroRaise
    ? clamp(mdf * 0.58 + textureBoost + pairedAdjustment, 0.20, 0.62)
    : clamp(mdf + textureBoost + pairedAdjustment, 0.45, 0.88);

  const pricedContinueCount = scored.filter(item =>
    item.equityVsHero + item.drawEquityBonus >= priceEquity * (isFacingHeroRaise ? 1.12 : 0.96)
  ).length;
  const mdfContinueCount = Math.round(n * continueTarget);
  const continueCount = Math.max(1, Math.min(n, Math.max(pricedContinueCount, mdfContinueCount)));

  const raiseTarget = isFacingHeroRaise
    ? clamp(0.025 + texture.wetness * 0.007, 0.015, 0.075)
    : clamp(0.045 + texture.wetness * 0.011 - (betSizePct >= 75 ? 0.010 : 0), 0.025, 0.105);

  const raiseCount = Math.max(0, Math.min(continueCount - 1, Math.round(n * raiseTarget)));
  const valueRaiseCount = Math.ceil(raiseCount * 0.72);
  const bluffRaiseCount = raiseCount - valueRaiseCount;

  const raiseSet = new Set();
  const byRaise = [...scored].sort((a, b) => b.raiseScore - a.raiseScore);
  byRaise.slice(0, valueRaiseCount).forEach(item => raiseSet.add(item.combo));

  if (bluffRaiseCount > 0) {
    const bluffCandidates = [...scored]
      .filter(item => item.hasDraw || item.combo.some(card => card.rank === 'A'))
      .sort((a, b) => (b.drawEquityBonus + b.continueScore / 200) - (a.drawEquityBonus + a.continueScore / 200));
    bluffCandidates.slice(0, bluffRaiseCount).forEach(item => raiseSet.add(item.combo));
  }

  const callItems = [];
  const byContinue = [...scored].sort((a, b) => b.continueScore - a.continueScore);
  for (const item of byContinue) {
    if (callItems.length + raiseSet.size >= continueCount) break;
    if (!raiseSet.has(item.combo)) callItems.push(item);
  }

  const callCombos = callItems.map(item => item.combo);
  const raiseCombos = scored.filter(item => raiseSet.has(item.combo)).map(item => item.combo);
  const continueSet = new Set([...callCombos, ...raiseCombos]);
  const foldCombos = scored.filter(item => !continueSet.has(item.combo)).map(item => item.combo);

  return rememberResponse(cacheKey, {
    foldRate: foldCombos.length / n,
    callRate: callCombos.length / n,
    raiseRate: raiseCombos.length / n,
    foldCombos,
    callCombos,
    raiseCombos,
  });
}

function equityVsSubset(heroCombo, villainCombos, board, predicate) {
  // Lightweight estimator for hero's equity vs a filtered subset.
  // Just measures hero's strength rank among the filtered set.
  // (Avoids running another full MC — used for quick EV approximations.)
  const filtered = villainCombos.filter(c => predicate(c));
  if (filtered.length === 0) return 0.5;
  const { equity } = monteCarloEquity(heroCombo, filtered, board, 400);
  return equity;
}

function equityRealizationFactor(ctx) {
  if (ctx.street === 'river') return 1;
  let factor = ctx.heroIP ? 0.99 : 0.91;
  if (ctx.street === 'flop') factor -= ctx.heroIP ? 0.02 : 0.04;
  if (ctx.preflopAction?.aggressor === ctx.heroPos) factor += 0.025;
  if (ctx.currentDecision?.type === 'facing-bet') factor -= ctx.heroIP ? 0.015 : 0.025;
  if (ctx.currentDecision?.type === 'facing-raise' || ctx.currentDecision?.type === 'facing-3bet') factor -= 0.035;
  return clamp(factor, 0.72, 1.03);
}

function applySolverShapePriors(ctx, evs) {
  if (ctx.currentDecision.type !== 'first-to-act' && ctx.currentDecision.type !== 'checked-to') return evs;

  const adjusted = { ...evs };
  const texture = getBoardTexture(ctx.boardCards);
  const heroPfa = ctx.preflopAction?.aggressor === ctx.heroPos;
  const dryHigh = texture.wetness <= 1 && texture.highCard >= 12 && !texture.monotone;
  const wetDynamic = texture.wetness >= 3 || texture.monotone;
  const paired = texture.paired;
  const lowSpr = ctx.stackBB / Math.max(1, ctx.potBB) <= 3.2;

  if (heroPfa && dryHigh) {
    adjusted['Bet 25%'] = (adjusted['Bet 25%'] ?? -1e6) + 0.95;
    adjusted['Bet 50%'] = (adjusted['Bet 50%'] ?? -1e6) + 0.28;
    adjusted['Bet 75%'] = (adjusted['Bet 75%'] ?? -1e6) - 0.42;
    adjusted['Bet 100%'] = (adjusted['Bet 100%'] ?? -1e6) - 0.72;
    adjusted.Check = (adjusted.Check ?? 0) + (ctx.heroIP ? 0.08 : 0.04);
  }

  if (wetDynamic) {
    adjusted['Bet 25%'] = (adjusted['Bet 25%'] ?? -1e6) - 0.14;
    adjusted['Bet 75%'] = (adjusted['Bet 75%'] ?? -1e6) + 0.18;
    adjusted['Bet 100%'] = (adjusted['Bet 100%'] ?? -1e6) + 0.12;
  }

  if (paired) {
    adjusted['Bet 25%'] = (adjusted['Bet 25%'] ?? -1e6) + 0.22;
    adjusted['Bet 100%'] = (adjusted['Bet 100%'] ?? -1e6) - 0.18;
  }

  if (!heroPfa) {
    adjusted.Check = (adjusted.Check ?? 0) + (ctx.heroIP ? 0.18 : 0.28);
    adjusted['Bet 25%'] = (adjusted['Bet 25%'] ?? -1e6) - 0.08;
    adjusted['Bet 50%'] = (adjusted['Bet 50%'] ?? -1e6) - 0.08;
    adjusted['Bet 75%'] = (adjusted['Bet 75%'] ?? -1e6) - 0.12;
    adjusted['Bet 100%'] = (adjusted['Bet 100%'] ?? -1e6) - 0.16;
  }

  if ((ctx.preflopAction?.potType === '3BP' || ctx.preflopAction?.potType === '4BP') && !lowSpr) {
    adjusted['Bet 25%'] = (adjusted['Bet 25%'] ?? -1e6) + 0.16;
    adjusted['Bet 50%'] = (adjusted['Bet 50%'] ?? -1e6) + 0.10;
    adjusted['Bet 100%'] = (adjusted['Bet 100%'] ?? -1e6) - 0.20;
  }

  return adjusted;
}

function computeActionEVs(ctx, equity, villainCombos) {
  const pot = ctx.potBB;
  const eff = ctx.stackBB;
  const board = ctx.boardCards;
  const realFactor = equityRealizationFactor(ctx);

  // ---- FACING 3-BET ----
  // Hero raised on this street, villain re-raised. Hero now: call / 4-bet (jam) / fold.
  if (ctx.currentDecision.type === 'facing-3bet') {
    const g = getFacing3BetGeometry(ctx);
    const evs = {};
    evs['Fold'] = 0;
    evs['Call'] = equity * g.finalPotIfCall * realFactor - g.callAmount;

    // 4-bet at this SPR is functionally a jam in most spots. Model as all-in.
    if (g.heroJamDelta <= g.callAmount || g.heroJamDelta <= 0) {
      evs['4-bet (jam)'] = -1e6;
    } else {
      const jamSizePct = (ctx.stackBB / Math.max(0.1, pot)) * 100;
      const resp = estimateVillainResponses(villainCombos, board, jamSizePct, true, ctx.combo);
      const continueCombos = [...resp.callCombos, ...resp.raiseCombos];
      const villainFoldRate = clamp(resp.foldRate, 0.05, 0.72);
      const eqVs4betCall = continueCombos.length
        ? calculateEquity(ctx.combo, continueCombos, board).equity
        : equity * 0.58;
      evs['4-bet (jam)'] = villainFoldRate * g.potAtDecision +
                            (1 - villainFoldRate) * (eqVs4betCall * g.finalPotIfJamCalled * realFactor - g.heroJamDelta);
    }
    return evs;
  }

  if (ctx.currentDecision.type === 'facing-raise') {
    const g = getFacingRaiseGeometry(ctx);
    const evs = {};
    evs['Fold'] = 0;
    evs['Call'] = equity * g.finalPotIfCall * realFactor - g.callAmount;

    if (g.hero3BetTo <= g.villainRaiseTo || g.hero3BetAdd <= g.callAmount) {
      evs['3-bet'] = -1e6;
    } else {
      const resp = estimateVillainResponses(villainCombos, board, (g.hero3BetTo / Math.max(0.1, pot)) * 100, true, ctx.combo);
      const eqVsCallRange = resp.callCombos.length
        ? calculateEquity(ctx.combo, resp.callCombos, board).equity
        : equity * 0.68;
      evs['3-bet'] =
        resp.foldRate * g.potAtDecision +
        resp.callRate * (eqVsCallRange * g.finalPotIf3BetCalled * realFactor - g.hero3BetAdd) +
        resp.raiseRate * (-g.hero3BetAdd);
    }
    return evs;
  }

  if (ctx.currentDecision.type === 'facing-bet') {
    const g = getFacingBetGeometry(ctx);
    const evs = {};

    // FOLD: baseline 0 (don't put more in)
    evs['Fold'] = 0;

    // CALL: realize equity on callPot, minus call cost
    evs['Call'] = equity * g.finalPotIfCall * realFactor - g.callAmount;

    // RAISE: villain folds, calls, or 4-bets
    // Approximate villain response to our raise: fold most marginal hands, call top range
    // Fold rate: hands too weak to continue vs 3x raise (need ~37% equity)
    if (g.raiseTo <= g.villainBet || g.heroRaiseAdd <= 0) {
      evs['Raise'] = -1e6;
    } else {
      const resp = estimateVillainResponses(villainCombos, board, (g.raiseTo / Math.max(0.1, pot)) * 100, true, ctx.combo);
      const eqVsCallRange = resp.callCombos.length
        ? calculateEquity(ctx.combo, resp.callCombos, board).equity
        : equity * 0.78;
      const raiseEquity = resp.raiseCombos.length
        ? calculateEquity(ctx.combo, resp.raiseCombos, board).equity
        : equity * 0.55;
      const raiseNodeEVs = computeActionEVs(
        { ...ctx, currentDecision: { type: 'facing-3bet', initialBetSize: g.sizePct } },
        raiseEquity,
        resp.raiseCombos
      );
      const bestAfter3Bet = Math.max(raiseNodeEVs.Fold ?? 0, raiseNodeEVs.Call ?? -1e6, raiseNodeEVs['4-bet (jam)'] ?? -1e6);
      evs['Raise'] =
        resp.foldRate * (pot + g.villainBet) +
        resp.callRate * (eqVsCallRange * g.finalPotIfRaiseCalled * realFactor - g.raiseTo) +
        resp.raiseRate * (bestAfter3Bet - g.raiseTo);
    }

    return evs;
  }

  // First-to-act or checked-to: candidates are Check + bet sizes
  const evs = {};
  // CHECK: realize equity on current pot (no commitment)
  evs['Check'] = equity * pot * realFactor;

  for (const size of [25, 50, 75, 100]) {
    const bet = pot * size / 100;
    if (bet > eff) {
      evs['Bet ' + size + '%'] = -1e6; // can't bet, mark as invalid
      continue;
    }
    const resp = estimateVillainResponses(villainCombos, board, size, false, ctx.combo);
    const callPot = pot + 2 * bet;
    // When villain calls, range is stronger — discount our equity
    const eqVsCallRange = resp.callCombos.length
      ? calculateEquity(ctx.combo, resp.callCombos, board).equity
      : equity * 0.80;
    // When villain raises, we face a 3x raise; approximate EV as -bet
    // (hero typically folds bad hands vs raise, calls premiums — net negative)
    const raiseCombos = resp.raiseCombos;
    const raiseEquity = raiseCombos.length
      ? calculateEquity(ctx.combo, raiseCombos, board).equity
      : equity * 0.55;
    const raiseNodeEVs = computeActionEVs(
      { ...ctx, currentDecision: { type: 'facing-raise', initialBetSize: size } },
      raiseEquity,
      raiseCombos
    );
    const bestAfterRaise = Math.max(raiseNodeEVs.Fold ?? 0, raiseNodeEVs.Call ?? -1e6, raiseNodeEVs['3-bet'] ?? -1e6);
    const raiseEV = bestAfterRaise - bet;
    evs['Bet ' + size + '%'] =
      resp.foldRate * pot +
      resp.callRate * (eqVsCallRange * callPot * realFactor - bet) +
      resp.raiseRate * raiseEV;
  }
  return applySolverShapePriors(ctx, evs);
}

function softmaxMixActions(evs, beta = 0.7) {
  // beta = inverse-temperature in 1/BB. Higher beta → more pure strategy.
  // beta ≈ 0.7 means actions ~1.4 BB apart get ~e^1 = 2.7x frequency ratio.
  const entries = Object.entries(evs).filter(([_, v]) => v > -1e5);
  if (entries.length === 0) return {};
  const maxEV = Math.max(...entries.map(([_, v]) => v));
  const weights = entries.map(([name, v]) => [name, Math.exp(beta * (v - maxEV))]);
  const total = weights.reduce((s, [_, w]) => s + w, 0);
  const out = {};
  weights.forEach(([name, w]) => { out[name] = w / total; });
  return out;
}

function getRecommendation(ctx, inlineSolverData = null) {
  const nodeKey = buildGtoNodeKey(ctx);
  const abstractKey = buildAbstractSpotKey(ctx);
  const inlineNode = resolveInlineSolverNode(inlineSolverData, nodeKey, abstractKey);
  const libraryHit = inlineNode
    ? { node: inlineNode, sourceLabel: 'Exact/common GTO - imported JSON' }
    : lookupSolverNode(nodeKey, abstractKey);
  const exact = libraryHit
    ? normalizeSolverNode(libraryHit.node, nodeKey, libraryHit.sourceLabel, abstractKey)
    : null;
  if (exact) return exact;
  const rangeCtx = computeRangeContext(ctx);
  const rec = getFallbackRecommendation({ ...ctx, nodeKey, abstractKey, rangeContext: rangeCtx });
  return {
    ...rec,
    nodeKey,
    abstractKey,
    vCount: rangeCtx.vCount,
    rangeLabel: rangeCtx.rangeLabel,
  };
}

function parseTestCard(token) {
  return { rank: token[0], suit: token[1] };
}

function strategyActionPct(actions, name) {
  const action = actions.find(item => item.name === name);
  return action ? action.pct : 0;
}

function strategyMetric(actions, metric) {
  if (metric === 'betTotal') {
    return actions
      .filter(action => action.name.startsWith('Bet '))
      .reduce((sum, action) => sum + action.pct, 0);
  }
  if (metric === 'smallMediumTotal') {
    return strategyActionPct(actions, 'Bet 25%') + strategyActionPct(actions, 'Bet 50%');
  }
  return strategyActionPct(actions, metric);
}

function buildStrategyTestContext(testCase) {
  const preflopAction = PREFLOP_LINES.find(line => line.id === testCase.preflopId);
  const heroIP = isHeroIP(testCase.heroPos, testCase.villainPos);
  const currentDecision = getDecisionOptions(heroIP).find(option => option.id === testCase.decisionId);
  return {
    street: 'flop',
    heroPos: testCase.heroPos,
    villainPos: testCase.villainPos,
    combo: testCase.combo.map(parseTestCard),
    boardCards: testCase.board.map(parseTestCard),
    currentDecision,
    preflopAction,
    flopAction: null,
    turnAction: null,
    heroIP,
    stackBB: estimateRemainingStackForNode(preflopAction, null, null, 'flop', 100),
    potBB: preflopAction?.potBB || 6,
  };
}

function runPostflopStrategyTests() {
  return POSTFLOP_STRATEGY_TEST_CASES.map(testCase => {
    const ctx = buildStrategyTestContext(testCase);
    const strategy = estimatePostflopStrategy(ctx);
    const checks = testCase.expectations.map(expectation => {
      const value = strategyMetric(strategy.actions, expectation.metric);
      const minPass = expectation.min == null || value >= expectation.min;
      const maxPass = expectation.max == null || value <= expectation.max;
      return { ...expectation, value, pass: minPass && maxPass };
    });
    return {
      name: testCase.name,
      pass: checks.every(check => check.pass),
      boardClass: strategy.profile.boardInfo.primary,
      handClass: strategy.profile.hand.handClass,
      actions: strategy.actions.map(action => ({ name: action.name, pct: action.pct })),
      checks,
    };
  });
}

function runPostflopStrategyLatencyTests(iterations = 50) {
  const now = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());
  const contexts = POSTFLOP_STRATEGY_TEST_CASES.map(buildStrategyTestContext);
  const timings = [];
  for (let i = 0; i < iterations; i++) {
    for (const ctx of contexts) {
      const start = now();
      getRecommendation(ctx, null);
      timings.push(now() - start);
    }
  }
  const sorted = [...timings].sort((a, b) => a - b);
  const p95 = sorted[Math.floor(sorted.length * 0.95)] || 0;
  const max = sorted[sorted.length - 1] || 0;
  return {
    iterations,
    cases: contexts.length,
    samples: timings.length,
    averageMs: timings.reduce((sum, value) => sum + value, 0) / Math.max(1, timings.length),
    p95Ms: p95,
    maxMs: max,
    targetMs: 2000,
    pass: max < 2000,
  };
}

}

function estimateLineState(preflopAction, flopAction, turnAction, street, effectiveStack = Number.POSITIVE_INFINITY) {
  const hasStackLimit = Number.isFinite(Number(effectiveStack));
  let remaining = hasStackLimit ? Math.max(0.1, Number(effectiveStack) || 100) : Number.POSITIVE_INFINITY;
  let pot = preflopAction?.potBB || 6;

  const preflopCommit = preflopAction?.commitmentBB ?? pot / 2;
  if (hasStackLimit && preflopCommit > remaining) {
    pot = Math.max(1, remaining * 2);
    remaining = 0;
  } else {
    remaining -= preflopCommit;
  }

  const applyPostflopLine = (line) => {
    if (!line) return;
    const desiredCommit = pot * (line.commitmentMultiplier || 0);
    const actualCommit = hasStackLimit ? Math.min(Math.max(0, remaining), desiredCommit) : desiredCommit;
    pot += 2 * actualCommit;
    remaining -= actualCommit;
  };

  if ((street === 'turn' || street === 'river') && flopAction) {
    applyPostflopLine(flopAction);
  }
  if (street === 'river' && turnAction) {
    applyPostflopLine(turnAction);
  }

  return {
    pot: Math.max(1, Math.round(pot * 10) / 10),
    remaining: hasStackLimit ? Math.max(0.1, Math.round(remaining * 10) / 10) : Number.POSITIVE_INFINITY,
  };
}

function estimatePotForNode(preflopAction, flopAction, turnAction, street, effectiveStack = Number.POSITIVE_INFINITY) {
  return estimateLineState(preflopAction, flopAction, turnAction, street, effectiveStack).pot;
}

function estimateRemainingStackForNode(preflopAction, flopAction, turnAction, street, effectiveStack) {
  return estimateLineState(preflopAction, flopAction, turnAction, street, effectiveStack).remaining;
}

function estimateDecisionPotInfo(streetPot, decision, stackBB) {
  const pot = Math.max(1, Number(streetPot) || 1);
  const stack = Math.max(1, Number(stackBB) || 100);
  const cap = amount => Math.max(0.1, Math.min(stack, amount));

  if (!decision) {
    return { streetPot: pot, potAtDecision: pot, label: 'No action selected' };
  }

  if (decision.type === 'facing-bet') {
    const size = decision.betSize || 50;
    const bet = cap(pot * size / 100);
    return {
      streetPot: pot,
      potAtDecision: Math.round((pot + bet) * 10) / 10,
      callAmount: Math.round(bet * 10) / 10,
      finalPotIfCall: Math.round((pot + 2 * bet) * 10) / 10,
      label: `Facing ${size}% bet`,
    };
  }

  if (decision.type === 'facing-raise') {
    const size = decision.initialBetSize || 50;
    const openBet = cap(pot * size / 100);
    const raiseTo = cap(openBet * POSTFLOP_RAISE_MULTIPLIER);
    return {
      streetPot: pot,
      potAtDecision: Math.round((pot + openBet + raiseTo) * 10) / 10,
      callAmount: Math.round(Math.max(0, raiseTo - openBet) * 10) / 10,
      finalPotIfCall: Math.round((pot + 2 * raiseTo) * 10) / 10,
      label: `${size}% bet raised 3x`,
    };
  }

  if (decision.type === 'facing-3bet') {
    const size = decision.initialBetSize || 50;
    const openBet = cap(pot * size / 100);
    const heroRaiseTo = cap(openBet * POSTFLOP_RAISE_MULTIPLIER);
    const villain3BetTo = cap(openBet * POSTFLOP_3BET_MULTIPLIER);
    return {
      streetPot: pot,
      potAtDecision: Math.round((pot + heroRaiseTo + villain3BetTo) * 10) / 10,
      callAmount: Math.round(Math.max(0, villain3BetTo - heroRaiseTo) * 10) / 10,
      finalPotIfCall: Math.round((pot + 2 * villain3BetTo) * 10) / 10,
      label: `${size}% bet, raise, 3-bet`,
    };
  }

  return {
    streetPot: pot,
    potAtDecision: pot,
    label: decision.type === 'checked-to' ? 'Checked to Hero' : 'Hero first to act',
  };
}

function isHeroIP(heroPos, villainPos) {
  return POSTFLOP_ORDER.indexOf(heroPos) > POSTFLOP_ORDER.indexOf(villainPos);

function generateCombos(r1, r2, type) {
  if (r1 === r2) {
    const out = [];
    for (let i = 0; i < SUITS.length; i++) {
      for (let j = i + 1; j < SUITS.length; j++) {
        out.push([{ rank: r1, suit: SUITS[i] }, { rank: r2, suit: SUITS[j] }]);
      }
    }
    return out;
  }
  if (type === 'suited') {
    return SUITS.map(s => [{ rank: r1, suit: s }, { rank: r2, suit: s }]);
  }
  const out = [];
  SUITS.forEach(s1 => SUITS.forEach(s2 => {
    if (s1 !== s2) out.push([{ rank: r1, suit: s1 }, { rank: r2, suit: s2 }]);
  }));
  return out;
}

function handCellLabel(r1, r2, rowIdx, colIdx) {
  if (rowIdx === colIdx) return r1 + r2;
  if (rowIdx < colIdx) return r1 + r2 + 's';
  return r2 + r1 + 'o';
}

function rangeComboCount(rangeSet) {
  if (!rangeSet || rangeSet.size === 0) return 0;
  let count = 0;
  rangeSet.forEach(hand => {
    if (hand.length === 2) count += 6;
    else if (hand.endsWith('s')) count += 4;
    else if (hand.endsWith('o')) count += 12;
  });
  return count;
}

function comboRangeSet(combos) {
  const out = new Set();
  (combos || []).forEach(combo => out.add(_comboToHand(combo).label));
  return out;
}

function allHandLabels() {
  return RANKS.flatMap((r1, i) => RANKS.map((r2, j) => handCellLabel(r1, r2, i, j)));
}

const PREFLOP_ACTION_META = {
  raise: { label: 'Raise', className: 'action-raise' },
  call: { label: 'Call', className: 'action-call' },
  fold: { label: 'Fold', className: 'action-fold' },
};

function unionRanges(...ranges) {
  const out = new Set();
  ranges.forEach(range => (range || new Set()).forEach(hand => out.add(hand)));
  return out;
}

function buildPreflopActionMap({ raise = new Set(), call = new Set() } = {}) {
  const actionMap = {};
  allHandLabels().forEach(hand => {
    actionMap[hand] = 'fold';
  });
  call.forEach(hand => {
    actionMap[hand] = 'call';
  });
  raise.forEach(hand => {
    actionMap[hand] = 'raise';
  });
  return actionMap;
}

function rfiStrategyView(pos, label = null) {
  const raise = RFI_RANGES[pos] || new Set();
  return rangeView(
    raise,
    label || `${pos} RFI strategy`,
    null,
    buildPreflopActionMap({ raise })
  );
}

function facingPfrStrategyView(pos, opener, label = null) {
  const raise = THREEBET_RANGES[`vs${opener}`] || THREEBET_RANGES.vsMP || new Set();
  const call = resolveRangeFacingPfr(pos, opener);
  return rangeView(
    unionRanges(raise, call),
    label || `${pos} vs ${opener} raise strategy`,
    null,
    buildPreflopActionMap({ raise, call })
  );
}

function facingThreeBetStrategyView(pos, label = null) {
  const raise = FOURBET_RANGES[pos] || new Set();
  const call = CALL_VS_3BET_RANGES[pos] || new Set();
  return rangeView(
    unionRanges(raise, call),
    label || `${pos} vs 3-bet strategy`,
    null,
    buildPreflopActionMap({ raise, call })
  );
}

function facingFourBetStrategyView(pos, label = null) {
  const call = CALL_VS_4BET_RANGES[pos] || new Set();
  return rangeView(
    call,
    label || `${pos} vs 4-bet strategy`,
    null,
    buildPreflopActionMap({ call })
  );
}

function resolveHeroPreflopRange(preflopAction, heroPos) {
  if (!heroPos) return new Set();
  if (!preflopAction) return RFI_RANGES[heroPos] || new Set();
  const heroIsOpener = preflopAction.opener === heroPos;

  if (preflopAction.potType === 'SRP') {
    if (heroIsOpener) return RFI_RANGES[heroPos] || new Set();
    const key = `${heroPos}|${preflopAction.opener}`;
    return DEFEND_RANGES[key] || resolveDefaultDefendRange(heroPos, preflopAction.opener);
  }
  if (preflopAction.potType === '3BP') {
    if (heroIsOpener) return CALL_VS_3BET_RANGES[heroPos] || new Set();
    return THREEBET_RANGES[`vs${preflopAction.opener}`] || THREEBET_RANGES.vsMP || new Set();
  }
  if (preflopAction.potType === '4BP') {
    if (heroIsOpener) return FOURBET_RANGES[heroPos] || new Set();
    return CALL_VS_4BET_RANGES[heroPos] || new Set();
  }
  return new Set();
}

function describePreflopRangeRole(preflopAction, pos, fallback = 'range') {
  if (!pos) return fallback;
  if (!preflopAction) return `${pos} RFI range`;
  const isOpener = preflopAction.opener === pos;

  if (preflopAction.potType === 'SRP') {
    return isOpener
      ? `${pos} RFI range`
      : `${pos} calling range vs ${preflopAction.opener} raise`;
  }
  if (preflopAction.potType === '3BP') {
    return isOpener
      ? `${pos} call-vs-3bet range`
      : `${pos} 3-bet range vs ${preflopAction.opener} PFR`;
  }
  if (preflopAction.potType === '4BP') {
    return isOpener
      ? `${pos} 4-bet range`
      : `${pos} call-vs-4bet range`;
  }
  return `${pos} ${fallback}`;
}

function resolvePreflopStrategyView(preflopAction, pos) {
  if (!pos) return rangeView(new Set(), 'Choose player');
  if (!preflopAction) return rfiStrategyView(pos, `${pos} RFI strategy`);
  const isOpener = preflopAction.opener === pos;

  if (preflopAction.potType === 'SRP') {
    return isOpener
      ? rfiStrategyView(pos, `${pos} RFI strategy`)
      : facingPfrStrategyView(pos, preflopAction.opener, `${pos} calling strategy vs ${preflopAction.opener} raise`);
  }
  if (preflopAction.potType === '3BP') {
    return isOpener
      ? facingThreeBetStrategyView(pos, `${pos} strategy facing 3-bet`)
      : facingPfrStrategyView(pos, preflopAction.opener, `${pos} 3-bet strategy vs ${preflopAction.opener}`);
  }
  if (preflopAction.potType === '4BP') {
    return isOpener
      ? facingThreeBetStrategyView(pos, `${pos} 4-bet strategy`)
      : facingFourBetStrategyView(pos, `${pos} strategy facing 4-bet`);
  }
  return rangeView(resolveHeroPreflopRange(preflopAction, pos), describePreflopRangeRole(preflopAction, pos, 'preflop range'));
}

function rangeView(rangeSet, label, comboCount = null, actionMap = null) {
  return { rangeSet: rangeSet || new Set(), label, comboCount, actionMap };
}

function resolveRangeFacingPfr(pos, opener) {
  if (!pos || !opener) return new Set();
  const key = `${pos}|${opener}`;
  return DEFEND_RANGES[key] || resolveDefaultDefendRange(pos, opener);
}

function resolvePartialPreflopRange(preflopSequence, targetRole, targetPos) {
  if (!targetPos) return rangeView(new Set(), 'Choose player');

  const raises = (preflopSequence || []).filter(item => item.action === 'raise');
  if (raises.length === 0) {
    return rfiStrategyView(targetPos, `${targetPos} RFI strategy`);
  }

  const opener = raises[0];
  const openerPos = opener.position;
  const isOpener = opener.actor === targetRole;

  if (raises.length === 1) {
    return isOpener
      ? rfiStrategyView(targetPos, `${targetPos} raise/RFI strategy`)
      : facingPfrStrategyView(targetPos, openerPos, `${targetPos} facing ${openerPos} raise strategy`);
  }

  const threeBettor = raises[1];
  if (raises.length === 2) {
    return threeBettor.actor === targetRole
      ? facingPfrStrategyView(targetPos, openerPos, `${targetPos} 3-bet strategy vs ${openerPos}`)
      : facingThreeBetStrategyView(targetPos, `${targetPos} facing 3-bet strategy`);
  }

  const fourBettor = raises[2];
  return fourBettor.actor === targetRole
    ? facingThreeBetStrategyView(targetPos, `${targetPos} 4-bet strategy`)
    : facingFourBetStrategyView(targetPos, `${targetPos} facing 4-bet strategy`);
}

            <div
              key={`${r1}-${r2}`}
              className={`range-cell ${active ? 'active' : ''} ${diagonal ? 'pair' : ''} ${actionClass}`}
              style={!action && active ? { '--range-accent': accent } : undefined}
              title={`${label}: ${actionLabel}`}
            >
              {label}
            </div>
          );
        }))}
      </div>
    </section>
  );
}

function CardPicker({ disabled, onPick, selectedCards }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {SUITS.map(suit => (
        <div key={suit} style={{ display: 'flex', gap: 4, flexWrap: 'nowrap', overflowX: 'auto', paddingBottom: 2 }}>
          {RANKS.map(rank => {
            const card = { rank, suit };
            const key = rank + suit;
            const isDisabled = disabled.some(c => c.rank === rank && c.suit === suit);
            const isSelected = selectedCards.some(c => c && c.rank === rank && c.suit === suit);
            return (
              <button
                key={key}
                disabled={isDisabled}
                title={`${rank} of ${SUIT_NAMES[suit]}`}
                onClick={() => onPick(card)}
                style={{
                  width: 34,
                  height: 46,
                  background: isSelected ? '#c9a961' : isDisabled ? '#161816' : '#fbf8f0',
                  color: isSelected ? '#0d0e0c' : isDisabled ? '#3a3a36' : SUIT_COLORS[suit],
                  border: '1px solid #2a2c29',
                  borderRadius: 4,
                  fontFamily: 'Fraunces, Georgia, serif',
                  fontWeight: 600,
                  fontSize: 13,
                  cursor: isDisabled ? 'not-allowed' : 'pointer',
                  opacity: isDisabled ? 0.3 : 1,
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'center',
                  justifyContent: 'center',
                  padding: 0,
                  lineHeight: 1,
                }}
              >
                <span>{rank}</span>
                <span style={{ fontSize: 14 }}>{SUIT_SYMBOLS[suit]}</span>
              </button>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [street, setStreet] = useState('flop');
  const [heroPos, setHeroPos] = useState(null);
  const [heroStack, setHeroStack] = useState(100);
  const [heroHand, setHeroHand] = useState(null);
  const [holeInput, setHoleInput] = useState('');
  const [holePickerCards, setHolePickerCards] = useState([null, null]);
  const [pickingHoleIdx, setPickingHoleIdx] = useState(0);
  const [showHolePicker, setShowHolePicker] = useState(false);
  const [combo, setCombo] = useState(null);
  const [villainPos, setVillainPos] = useState(null);
  const [villainStack, setVillainStack] = useState(100);
  const [preflopActionId, setPreflopActionId] = useState('');
  const [flopActionId, setFlopActionId] = useState('');
  const [turnActionId, setTurnActionId] = useState('');
  const [board, setBoard] = useState([null, null, null, null, null]);
  const [potBB, setPotBB] = useState(6);
  const [currentDecisionId, setCurrentDecisionId] = useState('');
  const [pickingBoardIdx, setPickingBoardIdx] = useState(0);
  const [boardInput, setBoardInput] = useState('');
  const [showBoardPicker, setShowBoardPicker] = useState(false);
  const [solverNodeJson, setSolverNodeJson] = useState('');
  const [equityResult, setEquityResult] = useState(null);
  const [preflopSequence, setPreflopSequence] = useState([]);
  const [streetActionSequence, setStreetActionSequence] = useState([]);
  const [actionLog, setActionLog] = useState([]);
  const defaultActionSize = 50;
  const [handEnded, setHandEnded] = useState(false);

  // ----- AUTO-SCROLL REFS -----
  const refHero = useRef(null);
  const refHole = useRef(null);
  const refVillain = useRef(null);
  const refPreflop = useRef(null);
  const refBoard = useRef(null);
  const refDecision = useRef(null);
  const refResult = useRef(null);
  const refAdvance = useRef(null);

  const scrollTo = (ref) => {
    if (ref.current) {
      setTimeout(() => {
        ref.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 120);
    }
  };

  const positions = POSITIONS_8;
  const heroIP = heroPos && villainPos ? isHeroIP(heroPos, villainPos) : null;
  const effectiveStack = Math.min(heroStack, villainStack);
  const boardCardCount = STREET_CONFIG[street].cards;
  const streetLabel = STREET_CONFIG[street].label;
  const boardCards = useMemo(() => board.slice(0, boardCardCount), [board, boardCardCount]);
  const boardComplete = boardCardCount > 0 && boardCards.every(c => c !== null);

  const preflopOptions = useMemo(() => {
    if (!heroPos || !villainPos) return [];
    return PREFLOP_LINES.filter(line => line.players.includes(heroPos) && line.players.includes(villainPos));
  }, [heroPos, villainPos]);

  const flopActionOptions = useMemo(() => makePostflopLines(heroIP), [heroIP]);
  const turnActionOptions = useMemo(() => makePostflopLines(heroIP), [heroIP]);
  const currentDecisionOptions = useMemo(() => getDecisionOptions(heroIP), [heroIP]);

  const selectedPreflopAction = useMemo(
    () => PREFLOP_LINES.find(line => line.id === preflopActionId) || null,
    [preflopActionId]
  );
  const selectedFlopAction = useMemo(
    () => flopActionOptions.find(line => line.id === flopActionId) || null,
    [flopActionOptions, flopActionId]
  );
  const selectedTurnAction = useMemo(
    () => turnActionOptions.find(line => line.id === turnActionId) || null,
    [turnActionOptions, turnActionId]
  );
  const currentDecision = useMemo(
    () => currentDecisionOptions.find(option => option.id === currentDecisionId) || null,
    [currentDecisionOptions, currentDecisionId]
  );
  const remainingStackBB = useMemo(
    () => estimateRemainingStackForNode(selectedPreflopAction, selectedFlopAction, selectedTurnAction, street, effectiveStack),
    [selectedPreflopAction, selectedFlopAction, selectedTurnAction, street, effectiveStack]
  );
  const decisionPotInfo = useMemo(
    () => estimateDecisionPotInfo(potBB, currentDecision, remainingStackBB),
    [potBB, currentDecision, remainingStackBB]
  );

  const precedingActionComplete = Boolean(
    selectedPreflopAction &&
    (street === 'flop' || selectedFlopAction) &&
    (street !== 'river' || selectedTurnAction)
  );
  const streetIndex = STREET_SEQUENCE.indexOf(street);
  const recommendationNumber = streetIndex + 1;

  const handEval = useMemo(() => {
    if (combo && boardComplete) return evalHand(combo, boardCards);
    return null;
  }, [combo, boardCards, boardComplete]);

  const solverJsonResult = useMemo(() => parseSolverNodeJson(solverNodeJson), [solverNodeJson]);

  const analysisContext = useMemo(() => {
    if (!handEval || !currentDecision || !precedingActionComplete) return null;
    return {
      street,
      heroPos,
      villainPos,
      combo,
      boardCards,
      handEval,
      currentDecision,
      preflopAction: selectedPreflopAction,
      flopAction: selectedFlopAction,
      turnAction: selectedTurnAction,
      heroIP,
      stackBB: remainingStackBB,
      potBB,
    };
  }, [
    handEval,
    currentDecision,
    precedingActionComplete,
    street,
    heroPos,
    villainPos,
    combo,
    boardCards,
    selectedPreflopAction,
    selectedFlopAction,
    selectedTurnAction,
    heroIP,
    remainingStackBB,
    potBB,
  ]);

  const recommendation = useMemo(() => {
    if (!analysisContext) return null;
    return getRecommendation(analysisContext, solverJsonResult.node);
  }, [
    analysisContext,
    solverJsonResult.node,
  ]);
  const canAdvanceToTurn = Boolean(recommendation && street === 'flop');
  const canAdvanceToRiver = Boolean(recommendation && street === 'turn');
  const heroRangeView = useMemo(() => {
    if (selectedPreflopAction) {
      return resolvePreflopStrategyView(selectedPreflopAction, heroPos);
    }
    return resolvePartialPreflopRange(preflopSequence, 'Hero', heroPos);
  }, [selectedPreflopAction, heroPos, preflopSequence]);

  const villainRangeView = useMemo(() => {
    if (analysisContext) {
      const ctx = computeRangeContext(analysisContext);
      return {
        rangeSet: comboRangeSet(ctx.villainCombos),
        comboCount: ctx.vCount,
        label: ctx.rangeLabel || `${villainPos || 'Villain'} perceived range`,
      };
    }
    if (selectedPreflopAction) {
      return resolvePreflopStrategyView(selectedPreflopAction, villainPos);
    }
    return resolvePartialPreflopRange(preflopSequence, 'Villain', villainPos);
  }, [analysisContext, selectedPreflopAction, preflopSequence, heroPos, villainPos]);

  useEffect(() => {
    if (!analysisContext || !recommendation) {
      setEquityResult(null);
      return undefined;
    }

    const rangeCtx = computeRangeContext(analysisContext);
    setEquityResult({
      status: 'queued',
      equity: null,
      vCount: rangeCtx.vCount,
      rangeLabel: rangeCtx.rangeLabel,
      sourceLabel: `Equity queued off-path - ${rangeCtx.vCount || 0} combos`,
    });

    let cancelled = false;
    const run = () => {
      const start = typeof performance !== 'undefined' ? performance.now() : Date.now();
      const eqCtx = computeEquityContext(analysisContext);
      if (cancelled) return;
      const end = typeof performance !== 'undefined' ? performance.now() : Date.now();
      const equityMode = eqCtx.mode === 'exact' ? 'exact runout equity' : eqCtx.mode === 'mc' ? 'Monte Carlo equity' : 'equity unavailable';
      setEquityResult({
        status: 'ready',
        equity: eqCtx.equity,
        vCount: eqCtx.vCount,
        rangeLabel: eqCtx.rangeLabel,
        sourceLabel: `${equityMode} - ${eqCtx.samples || 0} samples - ${Math.round(end - start)} ms`,
      });
    };

    let idleId = null;
    let timeoutId = null;
    if (typeof window !== 'undefined' && typeof window.requestIdleCallback === 'function') {
      idleId = window.requestIdleCallback(run, { timeout: 1200 });
    } else {
      timeoutId = setTimeout(run, 180);
    }

    return () => {
      cancelled = true;
      if (idleId != null && typeof window !== 'undefined' && typeof window.cancelIdleCallback === 'function') {
        window.cancelIdleCallback(idleId);
      }
      if (timeoutId != null) clearTimeout(timeoutId);
    };
  }, [analysisContext, recommendation?.nodeKey]);

  useEffect(() => {
    if (currentDecisionId && !currentDecisionOptions.some(option => option.id === currentDecisionId)) {
      setCurrentDecisionId('');
    }
  }, [currentDecisionOptions, currentDecisionId]);

  useEffect(() => {
    if (
      boardComplete &&
      precedingActionComplete &&
      heroIP === false &&
      streetActionSequence.length === 0 &&
      !currentDecisionId &&
      !handEnded
    ) {
      setCurrentDecisionId('oop-hero-first-to-act');
    }
  }, [boardComplete, precedingActionComplete, heroIP, streetActionSequence.length, currentDecisionId, handEnded]);

  // Auto-scroll cascade
  // Removed: auto-scroll on heroPos — keeps position pills reachable for re-clicks.
  useEffect(() => { if (combo) scrollTo(refVillain); }, [combo]);
  // Removed: auto-scroll on villainPos — keeps villain pills reachable for re-clicks.
  // Removed: auto-scroll on preflopActionId — keeps preflop pills reachable for re-clicks.
  useEffect(() => { if (boardComplete) scrollTo(refDecision); }, [boardComplete]);
  useEffect(() => { if (currentDecisionId) scrollTo(refResult); }, [currentDecisionId]);

  // Keyboard shortcut: number keys 1..N select position when on hero/villain step
  useEffect(() => {
    function handleKey(e) {
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
      const num = parseInt(e.key, 10);
      if (isNaN(num) || num < 1 || num > positions.length) return;
      const pos = positions[num - 1];
      if (!pos) return;
      if (!heroPos) {
        // No hero yet — set it (preserves heroHand/combo/board)
        setHeroPos(pos);
        setVillainPos(null);
        setPreflopActionId(''); setFlopActionId(''); setTurnActionId('');
        setStreet('flop'); setCurrentDecisionId('');
      } else if (!villainPos && pos !== heroPos) {
        // Hero set, no villain yet, pressed key isn't hero — set villain
        setVillainPos(pos);
        setPreflopActionId(''); setFlopActionId(''); setTurnActionId('');
        setStreet('flop'); setCurrentDecisionId('');
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [heroPos, villainPos, positions]);

  // Auto-update pot estimate when preflop/flop/turn action selection changes.
  // User can override by typing — but the estimate is refreshed every time the
  // action tree changes, so the pot math stays in sync with the line you picked.
  useEffect(() => {
    const est = estimatePotForIds(preflopActionId, flopActionId, turnActionId);
    if (est && est !== potBB) setPotBB(est);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [preflopActionId, flopActionId, turnActionId, street, effectiveStack]);

  const resetFrom = (step) => {
    if (step <= 1) { setHeroPos(null); }
    if (step <= 2) {
      setHeroHand(null);
      setCombo(null);
      setHolePickerCards([null, null]);
      setPickingHoleIdx(0);
      setShowHolePicker(false);
    }
    if (step <= 3) { setVillainPos(null); }
    if (step <= 4) {
      setPreflopActionId('');
      setFlopActionId('');
      setTurnActionId('');
      setPreflopSequence([]);
      setStreetActionSequence([]);
      setActionLog([]);
      setStreet('flop');
      setPotBB(6);
    }
    if (step <= 5) {
      setBoard([null, null, null, null, null]);
      setPickingBoardIdx(0);
      setShowBoardPicker(false);
      setStreet('flop');
      setStreetActionSequence([]);
    }
    if (step <= 6) { setCurrentDecisionId(''); setStreetActionSequence([]); }
    setHandEnded(false);
    setEquityResult(null);
  };

  const estimatePotForIds = (preId, flopId, turnId, targetStreet = street) => {
    const pre = PREFLOP_LINES.find(line => line.id === preId) || null;
    const flopLine = flopActionOptions.find(line => line.id === flopId) || null;
    const turnLine = turnActionOptions.find(line => line.id === turnId) || null;
    return estimatePotForNode(pre, flopLine, turnLine, targetStreet, effectiveStack);
  };

  const advanceToTurn = (flopLineId) => {
    if (!flopLineId) return;
    setFlopActionId(flopLineId);
    setTurnActionId('');
    setStreet('turn');
    setPotBB(estimatePotForIds(preflopActionId, flopLineId, '', 'turn'));
    setCurrentDecisionId('');
    setPickingBoardIdx(3);
    setShowBoardPicker(false);
    setStreetActionSequence([]);
    setEquityResult(null);
    setTimeout(() => scrollTo(refBoard), 120);
  };

  const advanceToRiver = (turnLineId) => {
    if (!turnLineId) return;
    setTurnActionId(turnLineId);
    setStreet('river');
    setPotBB(estimatePotForIds(preflopActionId, flopActionId, turnLineId, 'river'));
    setCurrentDecisionId('');
    setPickingBoardIdx(4);
    setShowBoardPicker(false);
    setStreetActionSequence([]);
    setEquityResult(null);
    setTimeout(() => scrollTo(refBoard), 120);
  };

  const resetVisibleBoard = () => {
    const nextBoard = [...board];
    const start = street === 'flop' ? 0 : street === 'turn' ? 3 : 4;
    for (let i = start; i < boardCardCount; i++) nextBoard[i] = null;
    setBoard(nextBoard);
    setPickingBoardIdx(start);
    setShowBoardPicker(false);
    setCurrentDecisionId('');
    setStreetActionSequence([]);
    setEquityResult(null);
  };

  const otherRole = role => role === 'Hero' ? 'Villain' : 'Hero';
  const rolePosition = role => role === 'Hero' ? heroPos : villainPos;
  const roleLabel = role => `${role}${rolePosition(role) ? ` (${rolePosition(role)})` : ''}`;

  const selectHeroPosition = (pos) => {
    if (heroPos === pos) return;
    setHeroPos(pos);
    setVillainPos(null);
    setPreflopActionId('');
    setFlopActionId('');
    setTurnActionId('');
    setPreflopSequence([]);
    setStreetActionSequence([]);
    setActionLog([]);
    setHolePickerCards([null, null]);
    setPickingHoleIdx(0);
    setShowHolePicker(false);
    setBoard([null, null, null, null, null]);
    setPickingBoardIdx(0);
    setShowBoardPicker(false);
    setStreet('flop');
    setPotBB(6);
    setCurrentDecisionId('');
    setHandEnded(false);
    setEquityResult(null);
  };

  const selectVillainPosition = (pos) => {
    if (villainPos === pos || pos === heroPos) return;
    setVillainPos(pos);
    setPreflopActionId('');
    setFlopActionId('');
    setTurnActionId('');
    setPreflopSequence([]);
    setStreetActionSequence([]);
    setActionLog([]);
    setBoard([null, null, null, null, null]);
    setPickingBoardIdx(0);
    setShowBoardPicker(false);
    setStreet('flop');
    setPotBB(6);
    setCurrentDecisionId('');
    setHandEnded(false);
    setEquityResult(null);
  };

  const submitHoleInput = () => {
    const parsed = _parseHoleInput(holeInput);
    if (!parsed) return;
    if (parsed.type === 'combo') {
      setHeroHand(_comboToHand(parsed.combo));
      setCombo(parsed.combo);
      setHolePickerCards(parsed.combo);
    } else {
      setHeroHand(parsed.hand);
      setCombo(null);
      setHolePickerCards([null, null]);
    }
    setHoleInput('');
    setShowHolePicker(false);
  };

  const pickHoleCard = (card) => {
    const nextCards = [...holePickerCards];
    nextCards[pickingHoleIdx] = card;
    setHolePickerCards(nextCards);

    const nextIdx = nextCards.findIndex(c => c === null);
    if (nextIdx !== -1) {
      setPickingHoleIdx(nextIdx);
      return;
    }

    setHeroHand(_comboToHand(nextCards));
    setCombo(nextCards);
    setHoleInput('');
    setShowHolePicker(false);
  };

  const appendActionLog = (entry) => {
    setActionLog(prev => [
      ...prev,
      {
        ...entry,
        id: `${entry.street}-${prev.length}`,
      },
    ]);
  };

  const firstPreflopActor = () => {
    if (!heroPos || !villainPos) return null;
    return positionIndex(heroPos) <= positionIndex(villainPos) ? 'Hero' : 'Villain';
  };

  const expectedPreflopActor = (seq = preflopSequence) => {
    const first = firstPreflopActor();
    if (!first || selectedPreflopAction || handEnded) return null;
    return seq.length % 2 === 0 ? first : otherRole(first);
  };

  const preflopLineFromSequence = (seq) => {
    if (seq.some(item => item.action === 'fold')) return null;
    const actions = seq.map(item => item.action);
    if (actions[0] !== 'raise') return null;

    const openerRole = seq[0].actor;
    const defenderRole = otherRole(openerRole);
    const opener = rolePosition(openerRole);
    const defender = rolePosition(defenderRole);
    if (!opener || !defender) return null;

    let label = null;
    if (actions.length === 2 && actions[1] === 'call') {
      label = `${opener} raise ${defender} call`;
    } else if (actions.length === 3 && actions[1] === 'raise' && actions[2] === 'call') {
      label = `${opener} raise ${defender} 3bet ${opener} call`;
    } else if (actions.length === 4 && actions[1] === 'raise' && actions[2] === 'raise' && actions[3] === 'call') {
      label = `${opener} raise ${defender} 3bet ${opener} 4bet ${defender} call`;
    }
    if (!label) return null;
    return PREFLOP_LINES.find(line => line.label === label) || null;
  };

  const finishPreflopLine = (line) => {
    setPreflopActionId(line.id);
    setFlopActionId('');
    setTurnActionId('');
    setStreet('flop');
    setBoard([null, null, null, null, null]);
    setPickingBoardIdx(0);
    setShowBoardPicker(false);
    setPotBB(estimatePotForIds(line.id, '', '', 'flop'));
    setCurrentDecisionId('');
    setStreetActionSequence([]);
    setEquityResult(null);
  };

  const handlePreflopAction = (actor, action) => {
    const expected = expectedPreflopActor();
    if (actor !== expected) return;
    const next = [...preflopSequence, { actor, position: rolePosition(actor), action }];
    setPreflopSequence(next);
    appendActionLog({
      street: 'Preflop',
      actor: roleLabel(actor),
      action: action === 'raise' ? 'Raise' : action === 'call' ? 'Call' : 'Fold',
    });

    if (action === 'fold') {
      setHandEnded(true);
      setCurrentDecisionId('');
      return;
    }

    const line = preflopLineFromSequence(next);
    if (line) finishPreflopLine(line);
  };

  const firstPostflopActor = () => {
    if (heroIP === null) return null;
    return heroIP ? 'Villain' : 'Hero';
  };

  const expectedPostflopActor = (seq = streetActionSequence) => {
    const first = firstPostflopActor();
    if (!first || !boardComplete || handEnded) return null;
    return seq.length % 2 === 0 ? first : otherRole(first);
  };

  const postflopDecisionFromSequence = (seq) => {
    if (!boardComplete || handEnded) return '';
    const nextActor = expectedPostflopActor(seq);
    if (nextActor !== 'Hero') return '';

    const a = seq.map(item => item.action);
    const bet = seq.find(item => item.action === 'bet');
    const size = bet?.size || defaultActionSize;

    if (heroIP) {
      if (a.length === 1 && a[0] === 'check') return 'ip-villain-checks-to-hero';
      if (a.length === 1 && a[0] === 'bet') return `ip-facing-villain-bet-${size}`;
      if (a.length === 3 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'raise') {
        return `ip-villain-check-hero-bet-${size}-villain-checkraise`;
      }
      if (a.length === 3 && a[0] === 'bet' && a[1] === 'raise' && a[2] === 'raise') {
        return `ip-villain-bet-${size}-hero-raise-villain-3bet`;
      }
      return '';
    }

    if (a.length === 0) return 'oop-hero-first-to-act';
    if (a.length === 2 && a[0] === 'check' && a[1] === 'bet') {
      return `oop-hero-check-facing-villain-bet-${size}`;
    }
    if (a.length === 4 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'raise' && a[3] === 'raise') {
      return `oop-hero-check-villain-bet-${size}-checkraise-villain-3bet`;
    }
    if (a.length === 2 && a[0] === 'bet' && a[1] === 'raise') {
      return `oop-hero-bet-${size}-villain-raise`;
    }
    return '';
  };

  const completedPostflopLineId = (seq) => {
    const a = seq.map(item => item.action);
    const bet = seq.find(item => item.action === 'bet');
    const size = bet?.size || defaultActionSize;

    if (heroIP) {
      if (a.length === 2 && a[0] === 'check' && a[1] === 'check') return 'ip-check-check';
      if (a.length === 2 && a[0] === 'bet' && a[1] === 'call') return `ip-villain-bet-${size}-hero-call`;
      if (a.length === 3 && a[0] === 'bet' && a[1] === 'raise' && a[2] === 'call') return `ip-villain-bet-${size}-hero-raise-call`;
      if (a.length === 4 && a[0] === 'bet' && a[1] === 'raise' && a[2] === 'raise' && a[3] === 'call') return `ip-villain-bet-${size}-hero-raise-3bet-call`;
      if (a.length === 3 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'call') return `ip-check-hero-bet-${size}-call`;
      if (a.length === 4 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'raise' && a[3] === 'call') return `ip-check-hero-bet-${size}-checkraise-call`;
      if (a.length === 5 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'raise' && a[3] === 'raise' && a[4] === 'call') return `ip-check-hero-bet-${size}-checkraise-3bet-call`;
      return '';
    }

    if (a.length === 2 && a[0] === 'check' && a[1] === 'check') return 'oop-check-check';
    if (a.length === 3 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'call') return `oop-hero-check-villain-bet-${size}-call`;

    if (a.length === 5 && a[0] === 'check' && a[1] === 'bet' && a[2] === 'raise' && a[3] === 'raise' && a[4] === 'call') return `oop-hero-check-villain-bet-${size}-checkraise-3bet-call`;
    if (a.length === 2 && a[0] === 'bet' && a[1] === 'call') return `oop-hero-bet-${size}-villain-call`;
    if (a.length === 3 && a[0] === 'bet' && a[1] === 'raise' && a[2] === 'call') return `oop-hero-bet-${size}-villain-raise-call`;
    if (a.length === 4 && a[0] === 'bet' && a[1] === 'raise' && a[2] === 'raise' && a[3] === 'call') return `oop-hero-bet-${size}-villain-raise-3bet-call`;
    return '';
  };

  const finishPostflopLine = (lineId) => {
    if (!lineId) return;
    if (street === 'flop') {
      advanceToTurn(lineId);
      return;
    }
    if (street === 'turn') {
      advanceToRiver(lineId);
      return;
    }
    setCurrentDecisionId('');
    setStreetActionSequence([]);
    setHandEnded(true);
  };

  const handlePostflopAction = (actor, action, size = defaultActionSize) => {
    const expected = expectedPostflopActor();
    if (actor !== expected) return;

    const next = [...streetActionSequence, { actor, position: rolePosition(actor), action, size }];
    setStreetActionSequence(next);
    appendActionLog({
      street: STREET_CONFIG[street].label,
      actor: roleLabel(actor),
      action: action === 'bet' ? `Raise ${size}%` : action === 'raise' ? 'Raise' : action === 'call' ? 'Call' : action === 'check' ? 'Check' : 'Fold',

    if (action === 'fold') {
      setHandEnded(true);
      setCurrentDecisionId('');
      return;

        { key: 'raise', label: 'Raise', disabled: role !== expected || !canRaise, onClick: () => handlePreflopAction(role, 'raise') },

    const last = streetActionSequence[streetActionSequence.length - 1];
    const pressureCount = streetActionSequence.filter(item => item.action === 'bet' || item.action === 'raise').length;
    const isEnabled = role === expected;

    if (!last || last.action === 'check') {

      ];
    }

    return [];
  };

                          }}
                          style={{ display: 'flex', justifyContent: 'center', gap: 3, padding: 5 }}
                        >
                          <Card rank={cb[0].rank} suit={cb[0].suit} size="sm" />
                          <Card rank={cb[1].rank} suit={cb[1].suit} size="sm" />
                        </button>
                      ))}
                    </div>
                  )}

                  {combo && (
                    <div className="line-strip">
                      {currentActionActor === 'Hero' ? 'Acting now' : 'Waiting'}
                    </div>
                  )}
                  </>)}
                </div>

                <div className={`player-card ${expectedPreflopActor() === 'Villain' || expectedPostflopActor() === 'Villain' ? 'active' : ''}`}>
                  <div className="seat-top">
                    <div>
                      <div className="role-tag">Villain</div>
                      <div className="seat-pos">{villainPos || 'Seat'}</div>
                    </div>
                    {villainPos && <button className="edit-btn" style={{ position: 'static' }} onClick={() => resetFrom(3)}>SEAT</button>}
                  </div>

                  {!villainPos ? (
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {positions.map(p => p === heroPos ? null : (
                        <button key={p} className="action-btn" onClick={() => selectVillainPosition(p)}>{p}</button>
                      ))}
                    </div>
                  ) : (
                    <>
                      <div className="field-row">
                        <span style={{ color: '#8a8478', fontSize: 12 }}>Stack</span>
                        <input
                          type="number"
                          className="inline-input"
                          style={{ width: 86 }}
                          value={villainStack}
                          onChange={e => setVillainStack(Math.max(1, Number(e.target.value) || 0))}
                          min="1"
                        />
                        <span style={{ fontFamily: 'JetBrains Mono, monospace', color: '#8a8478', fontSize: 11 }}>BB</span>
                      </div>
                      <div className="line-strip">
                        {currentActionActor === 'Villain' ? 'Acting now' : 'Waiting'}
                      </div>
                    </>
                  )}
                </div>
              </div>

              <div className="current-action-box">
                <div className="current-action-title">
                  {currentActionActor ? `${rolePosition(currentActionActor)} action` : 'Actions'}
                </div>
                <div className="action-row" style={{ marginTop: 0 }}>
                  {currentActionItems.length === 0 ? (
                    <span style={{ color: '#5a564c', fontSize: 12 }}>
                      {selectedPreflopAction ? `Input the ${streetLabel.toLowerCase()} to unlock actions.` : 'Choose seats and cards to begin.'}
                    </span>
                  ) : currentActionItems.map(action => (
                    <button key={action.key} className="action-btn" disabled={action.disabled} onClick={action.onClick}>
                      {rolePosition(currentActionActor)} {action.label}
                    </button>
                  ))}
                </div>
              </div>

              {selectedPreflopAction && (
                <div className="line-strip">
                  {selectedPreflopAction.label} - {selectedPreflopAction.potType}, pot {formatBB(potBB)} BB, remaining eff {formatBB(remainingStackBB)} BB
                </div>
              )}

              {combo && villainPos && !selectedPreflopAction && (
                <div className="line-strip">Preflop starts with {roleLabel(firstPreflopActor())}. Call becomes available after a raise.</div>
              )}
            </section>

            <section className="panel">
              <div className="panel-heading">
                <div>
                  <h3>Board</h3>
                  <p>{selectedPreflopAction ? `Input ${streetLabel.toLowerCase()} cards after the round ends.` : 'Complete preflop first.'}</p>
                </div>
                <span className="mini-stat">{streetLabel}</span>
              </div>

              <div className="board-cards">
                {Array.from({ length: boardCardCount }, (_, idx) => (
                  <div
                    key={idx}
                    className={`board-slot ${pickingBoardIdx === idx ? 'active' : ''}`}
                    onClick={() => {
                      setPickingBoardIdx(idx);
                      if (selectedPreflopAction && !handEnded) setShowBoardPicker(true);
                    }}
                  >
                    {board[idx] ? <Card rank={board[idx].rank} suit={board[idx].suit} size="lg" /> : BOARD_LABELS[idx]}
                  </div>
                ))}
              </div>

              {selectedPreflopAction && !handEnded && (
                <>
                  <div className="field-row">
                    <input
                      type="text"
                      className="inline-input"
                      style={{ width: 150, textTransform: 'none' }}
                      placeholder={street === 'flop' ? 'AhKd7c' : street === 'turn' ? '2s' : 'Jh'}
                      value={boardInput}
                      onChange={e => setBoardInput(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') submitBoardInput(); }}
                    />
                    <button className="action-btn" onClick={submitBoardInput}>Set</button>
                    <button className="action-btn" onClick={() => setShowBoardPicker(value => !value)}>
                      {showBoardPicker ? 'Hide' : 'Choose'}
                    </button>
                    {boardComplete && <button className="action-btn" onClick={resetVisibleBoard}>Edit</button>}
                  </div>
                  {showBoardPicker && (
                    <CardPicker
                      disabled={disabledCards}
                      selectedCards={boardCards}
                      onPick={card => {
                        const newBoard = [...board];
                        newBoard[pickingBoardIdx] = card;
                        setBoard(newBoard);
                        setCurrentDecisionId('');
                        setStreetActionSequence([]);
                        setEquityResult(null);
                        const next = newBoard.slice(0, boardCardCount).findIndex(c => c === null);
                        if (next !== -1) setPickingBoardIdx(next);
                        else setShowBoardPicker(false);
                      }}
                    />
                  )}
                </>
              )}
            </section>

            <section className="panel">
              <div className="panel-heading">
                <div>
                  <h3>Action Log</h3>
                  <p>Clicks from the player section are recorded here.</p>
                </div>
                <span className="mini-stat">{actionLog.length}</span>
              </div>
              <div className="action-log">
                {actionLog.length === 0 ? (
                  <div style={{ color: '#5a564c', fontSize: 12 }}>No action yet.</div>
                ) : actionLog.map(item => (
                  <div className="log-row" key={item.id}>
                    <span>{item.street}</span>
                    <strong>{item.actor}</strong>
                    <span>{item.action}</span>
                  </div>
                ))}
              </div>
              {handEnded && (
                <button className="pill-btn" style={{ marginTop: 14 }} onClick={() => resetFrom(4)}>Reset Action</button>
              )}
            </section>
          </section>

          <section className="dashboard-grid bottom-row">
            <RangeMatrix
              title="Hero Preflop Range"
              subtitle={heroRangeView.label}
              rangeSet={heroRangeView.rangeSet}
              comboCount={heroRangeView.comboCount}
              actionMap={heroRangeView.actionMap}
              accent="#4a8b6a"
            />
            <RangeMatrix
              title="Villain Perceived Range"
              subtitle={villainRangeView.label}
              rangeSet={villainRangeView.rangeSet}
              comboCount={villainRangeView.comboCount}
              actionMap={villainRangeView.actionMap}
              accent="#c9a961"
            />

            <section className="panel recommendation-panel">
              <div className="panel-heading">
                <div>
                  <h3>Recommendation</h3>
                  <p>{recommendation ? recommendation.sourceLabel : 'Recommendations appear when Hero is facing a decision.'}</p>
                </div>
                {recommendation && <span className="mini-stat">#{recommendationNumber}</span>}
              </div>

              {recommendation && handEval ? (
                <>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 14 }}>
                    <span className="summary-pill">{handEval.madeLabel}</span>
                    {handEval.drawLabels.length > 0 && <span className="summary-pill">+ {handEval.drawLabels.join(', ')}</span>}
                    {equityResult?.status === 'ready' && equityResult.equity != null && (
                      <span className="summary-pill">Equity {(equityResult.equity * 100).toFixed(1)}%</span>
                    )}
                  </div>
                  {recommendation.actions.map(act => (
                    <div className="rec-action" key={act.name}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12, marginBottom: 5 }}>
                        <strong style={{ color: act.color }}>{act.name}</strong>
                        <span style={{ color: act.color, fontFamily: 'JetBrains Mono, monospace' }}>{act.pct}%</span>
                      </div>
                      <div style={{ height: 8, background: '#0d0e0c', borderRadius: 4, overflow: 'hidden' }}>
                        <div style={{ width: `${act.pct}%`, height: '100%', background: act.color }} />
                      </div>
                      <div style={{ color: '#8a8478', fontSize: 11, marginTop: 4 }}>{act.detail}</div>
                    </div>
                  ))}
                </>
              ) : (
                <div style={{ color: '#5a564c', fontSize: 12, lineHeight: 1.6 }}>
                  Use the player buttons to reach Hero's decision point. No separate action list is needed.
                </div>
              )}
            </section>
          </section>


        </main>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
